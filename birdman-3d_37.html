function loadStore(){try{return JSON.parse(localStorage.getItem("birdman5")||"[]");}catch(e){return memStore;}}
function saveStore(v){try{localStorage.setItem("birdman5",JSON.stringify(v));}catch(e){memStore=v;}}
function storageOK(){try{localStorage.setItem("__t","1");localStorage.removeItem("__t");return true;}catch(e){return false;}}
function snapshot(name){
  const a=an,pol=computePolar();
  return {name,st:JSON.parse(JSON.stringify(st)),tpl:JSON.parse(JSON.stringify(tplSel)),
    m:{b:st.span,W:+a.W.toFixed(1),SM:+a.SM.toFixed(1),P:+a.Preq.toFixed(0),
       LD:+pol.bg.y.toFixed(1),dist:simRes?Math.round(simRes.dist):null}};
}
function encodeHash(){return "#d="+btoa(unescape(encodeURIComponent(JSON.stringify({st,tpl:tplSel}))));}
function loadFromHash(){
  try{
    const m=(location.hash||"").match(/#d=(.+)/);
    if(!m)return;
    const o=JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    if(o.st)Object.assign(st,o.st);
    if(o.tpl)Object.assign(tplSel,o.tpl);
  }catch(e){}
}
window.__svLoad=function(i){
  const d=loadStore()[i];if(!d)return;
  Object.assign(st,d.st);Object.assign(tplSel,d.tpl);
  refresh();
};
window.__svDel=function(i){
  const v=loadStore();v.splice(i,1);saveStore(v);
  if(TOOLS.save&&curTool==="save")TOOLS.save.refresh();
};

// ---- リブ型紙SVG ----
function afY(x){
  const f=arr=>{for(let i=1;i<arr.length;i++)if(arr[i][0]>=x){const u=(x-arr[i-1][0])/((arr[i][0]-arr[i-1][0])||1);return lerp(arr[i-1][1],arr[i][1],u);}return arr[arr.length-1][1];};
  const yu=f(AF.up),yl=f(AF.lo);return {yu,yl,mid:(yu+yl)/2};
}
function ribGroups(){
  const half=st.span/2,groups=[],seen=new Map();
  for(let y=st.ribPitch;y<half*0.995;y+=st.ribPitch){
    const t=y/half;
    const c=Math.round(chordAt(st,t)*1000/5)*5;
    const d=Math.round((lerp(st.rootDia,st.tipDia,t)+2)/5)*5;
    const key=c+"/"+d;
    if(seen.has(key))seen.get(key).count+=2;
    else{const g={no:groups.length+1,c,d,y:+y.toFixed(2),count:2};groups.push(g);seen.set(key,g);}
  }
  return groups;
}
function exportRibsSVG(){
  const groups=ribGroups();
  let svg="",yOff=16,maxW=0;
  const top=Math.max(...AF.up.map(p=>p[1])),bot=-Math.min(...AF.lo.map(p=>p[1]));
  for(const g of groups){
    const c=g.c;maxW=Math.max(maxW,c+20);
    yOff+=top*c+8;
    const pts=AF.up.slice().reverse().concat(AF.lo);
    const path=pts.map((p,j)=>(j?"L":"M")+(10+p[0]*c).toFixed(1)+" "+(yOff-p[1]*c).toFixed(1)).join("")+"Z";
    const m=afY(0.3),pm=afY(st.plankRatio/100);
    const px=10+st.plankRatio/100*c;
    svg+=`<path d="${path}" fill="none" stroke="#1B2A4A" stroke-width="0.4"/>`;
    svg+=`<circle cx="${(10+0.3*c).toFixed(1)}" cy="${(yOff-m.mid*c).toFixed(1)}" r="${(g.d/2).toFixed(1)}" fill="none" stroke="#E8590C" stroke-width="0.4"/>`;
    svg+=`<line x1="${px.toFixed(1)}" y1="${(yOff-pm.yu*c-3).toFixed(1)}" x2="${px.toFixed(1)}" y2="${(yOff-pm.yl*c+3).toFixed(1)}" stroke="#2C5F9E" stroke-width="0.3" stroke-dasharray="2 2"/>`;
    svg+=`<text x="10" y="${(yOff+bot*c+9).toFixed(1)}" font-size="6" fill="#1B2A4A" font-family="monospace">R${g.no}: y=${g.y}m  c=${g.c}mm  桁孔φ${g.d}mm  ×${g.count}枚</text>`;
    yOff+=bot*c+24;
  }
  const Wm=maxW+10,Hm=yOff+8;
  const doc=`<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${Wm}mm" height="${Hm}mm" viewBox="0 0 ${Wm} ${Hm}"><text x="10" y="10" font-size="5" fill="#46587A" font-family="monospace">リブ型紙(100%実寸で印刷) 翼幅${st.span}m プランク${st.plankRatio}% 桁孔は外径+2mmクリアランス</text>${svg}</svg>`;
  const aEl=document.createElement("a");
  aEl.href=URL.createObjectURL(new Blob([doc],{type:"image/svg+xml"}));
  aEl.download="birdman_ribs.svg";aEl.click();
  return groups;
}

// ---- ツールUI ----
function mkSlider2(parent,label,obj,key,min,max,step,unit,onchg){
  const w=document.createElement("div");w.className="sl";
  w.innerHTML=`<div class="lab"><span>${label}</span><span class="val"></span></div>`;
  const v=w.querySelector(".val");
  const i=document.createElement("input");
  i.type="range";i.min=min;i.max=max;i.step=step;i.value=obj[key];
  const show=()=>{if(v)v.textContent=(+obj[key]).toFixed(step<0.1?2:step<1?1:0)+unit;};
  i.oninput=()=>{obj[key]=parseFloat(i.value);show();if(onchg)onchg();};
  show();w.appendChild(i);parent.appendChild(w);
}

const TOOL_CAT={

function initTools(){
  const tb=document.getElementById("toolbar");
  tb.addEventListener("click",e=>{const k=e.target.dataset&&e.target.dataset.t;if(k)openTool(k);});
  buildToolbar();
  const KEYMAP={ArrowUp:["e",1],KeyW:["e",1],ArrowDown:["e",-1],KeyS:["e",-1],
    ArrowLeft:["ail",-1],KeyA:["ail",-1],ArrowRight:["ail",1],KeyD:["ail",1],
    KeyQ:["rud",-1],KeyE:["rud",1]};
  window.addEventListener("keydown",ev=>{
    if(!simPlay)return;
    // 出力操作: +/- や [ ] で出力増減(飛行中いつでも)
    // 出力操作: +/- [ ] PageUp/Down R/F で出力増減(飛行中いつでも)
    if(ev.code==="Equal"||ev.code==="NumpadAdd"||ev.code==="BracketRight"||ev.code==="PageUp"||ev.code==="KeyR"){adjustPower(20);ev.preventDefault();return;}
    if(ev.code==="Minus"||ev.code==="NumpadSubtract"||ev.code==="BracketLeft"||ev.code==="PageDown"||ev.code==="KeyF"){adjustPower(-20);ev.preventDefault();return;}
    const m=KEYMAP[ev.code];
    if(m){setCtrl(m[0],m[1]);ev.preventDefault();}
  });
  window.addEventListener("keyup",ev=>{
    const m=KEYMAP[ev.code];
    if(m)setCtrl(m[0],0);
  });
}
function buildToolbar(){
  const tb=document.getElementById("toolbar");if(!tb)return;

  const keys=Object.keys(TOOLS).filter(k=>(TOOL_CAT[k]||"design")===cat);

function adjustPower(d){
  if(!simPlay||simPrm.auto)return;
  simPrm.P=Math.max(0,Math.min(700,Math.round((simPrm.P+d)/10)*10));
  syncThrottle();

}
// 操縦パッドの表示制御(出力バーは廃止、出力はデータバー表示+R/Fキー)
function syncThrottle(){
  const show=!!simPlay && (!simPlay.wait||simPlay.wait<=0);
  // 操縦パッドオーバーレイ: 飛行中かつ手動(非オート)で表示
  const co=document.getElementById("ctrlOverlay");

}
function wireThrottle(){
  // 操縦パッドオーバーレイの押下→操舵(押している間ホールド)
  const bind=(id,ax,v)=>{
    const b=document.getElementById(id);if(!b)return;
    const press=e=>{e.preventDefault();setCtrl(ax,v);};
    const release=e=>{e.preventDefault();setCtrl(ax,0);};
    b.addEventListener("pointerdown",press);
    b.addEventListener("pointerup",release);
    b.addEventListener("pointerleave",release);
    b.addEventListener("pointercancel",release);
  };
  bind("coElUp","e",1); bind("coElDn","e",-1);
  bind("coAlL","ail",-1); bind("coAlR","ail",1);
  bind("coRdL","rud",-1); bind("coRdR","rud",1);
}

const tvGroup=new THREE.Group(); designGroup.add(tvGroup);
const tvPrm={topSize:8,sideSize:8,frontSize:30,opacity:0.55};
const tvData={top:{},side:{},front:{}};
const TV_DEF={
  top:{label:"上面図",hint:"機体の下に水平表示(スケール=画像の長辺)"},
  side:{label:"側面図",hint:"機体の左横に表示(スケール=画像の幅)"},
  front:{label:"正面図",hint:"機首の前に表示(スケール=画像の幅)"}};
function tvBuild(kind){
  const d=tvData[kind];
  if(d.mesh){tvGroup.remove(d.mesh); d.mesh=null;}
  if(!d.img)return;
  const L=tvPrm[kind+"Size"];
  const asp=(d.img.naturalHeight||1)/(d.img.naturalWidth||1);
  const tex=new THREE.Texture(d.img); tex.needsUpdate=true;
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:tvPrm.opacity,side:THREE.DoubleSide,depthWrite:false});
  const m=new THREE.Mesh(new THREE.PlaneGeometry(L,L*asp),mat);
  if(d.flip)m.scale.x=-1;
  if(kind==="top"){m.rotateX(-Math.PI/2); if(!d.rot)m.rotateZ(Math.PI/2); m.position.set(0,0.06,L/2);}
  else if(kind==="side"){m.rotateY(Math.PI/2); if(d.rot)m.rotateZ(Math.PI/2); m.position.set(-1.0,Math.max(L*asp/2,0.6)+0.02,L/2);}
  else {if(d.rot)m.rotateZ(Math.PI/2); m.position.set(0,Math.max(L*asp/2,0.6)+0.02,-0.9);}
  d.mesh=m; tvGroup.add(m);
}
function tvRebuildAll(){for(const k of ["top","side","front"])tvBuild(k);}

// ===== 総合解析ツール =====
function computeAnalysis(){
  const a=an, rho=1.225, g=9.81, W=a.W*g;
  const ac=aeroConsts();
  const {CD0,e,propEff,CLmaxWing,reSens,cm,thick}=ac;
  const CLmax=Math.min(1.6,CLmaxWing);
  const Vs=Math.sqrt(2*W/(rho*a.S*CLmax));
  const maxLD=computePolar().bg.y;
  const CP=st.powerMax;
  const Preq=a.Preq;
  const powerRatio=CP/Preq;
  const wingLoad=W/a.S;
  const Re=rho*a.V*a.MAC/1.81e-5;
  const glideDist=maxLD*10;
  const margin=CP-Preq;
  // 縦静安定: テールボリューム×安定余裕
  const af=airfoil();
  // 推定上昇率(余剰パワーから): RoC = (CP-Preq)/W
  const climbRate=Math.max(0,(CP-Preq)*propEff/W);
  // 失速余裕(巡航速度/失速速度)
  const stallMargin=a.V/Vs;
  return {Vs,maxLD,Preq,CP,powerRatio,wingLoad,Re,glideDist,margin,
    CD0,e,propEff,W,S:a.S,AR:a.AR,CLmax,climbRate,stallMargin,
    airfoilName:af.n,thick,cm};
}

      row("翼面荷重",r.wingLoad.toFixed(1),"N/m²",r.wingLoad<45?"var(--ok)":"var(--warn)","低いほど低速で飛べる")+
      row("レイノルズ数",(r.Re/1000).toFixed(0)+"k","",r.Re>4e5?"var(--ok)":"var(--warn)","巡航時・翼弦基準。低Reは抗力増")+
      row("無動力滑空距離",r.glideDist.toFixed(0),"m","var(--ink)","高度10m発進・最良滑空時")+
      row("推定上昇率",r.climbRate.toFixed(2),"m/s",r.climbRate>0.3?"var(--ok)":r.climbRate>0.1?"var(--warn)":"var(--bad)","余剰出力による。発進後の余裕")+
      row("失速余裕(V/Vs)",r.stallMargin.toFixed(2),"",r.stallMargin>=1.2?"var(--ok)":"var(--warn)","巡航/失速速度。1.2以上が安全")+
      row("翼型",r.airfoilName,`厚${(r.thick*100).toFixed(1)}%`,"var(--ink)",`最大CL ${r.CLmax.toFixed(2)}`);
    // ポーラー(所要パワー vs 速度)
    const pol=computePolar();
    const Pline=[[pol.pP[0][0],r.CP],[pol.pP[pol.pP.length-1][0],r.CP]];
    drawChart(document.getElementById("anaPolar"),{series:[
      {pts:pol.pP,color:"#1B2A4A",label:"所要パワー"},
      {pts:Pline,color:"#1E7F4F",label:"持続出力CP",dash:[5,4]}],
      xLabel:"対気速度 m/s",yLabel:"P W",yZero:false,
      marks:[{x:pol.mp.x,y:pol.mp.y,label:"最小P",color:"#2C5F9E"},{x:a.V,y:a.Preq,label:"巡航",color:"#E8590C"}]});
    // 総合評価
    const ev=document.getElementById("anaEval");
    if(ev){
      const scores=[];
      scores.push(["滑空性能",r.maxLD>=32?5:r.maxLD>=28?4:r.maxLD>=24?3:2]);
      scores.push(["出力余裕",r.powerRatio>=1.3?5:r.powerRatio>=1.15?4:r.powerRatio>=1.0?3:1]);
      scores.push(["安定性",a.SM>=5&&a.SM<=15?5:a.SM>=3&&a.SM<=18?4:2]);
      scores.push(["構造強度",a.sparSF>=2?5:a.sparSF>=1.5?4:a.sparSF>=1?3:1]);
      scores.push(["発進容易さ",r.Vs<6.5?5:r.Vs<7?4:r.Vs<7.5?3:2]);
      const total=scores.reduce((s,x)=>s+x[1],0);
      const grade=total>=23?"S":total>=20?"A":total>=16?"B":total>=12?"C":"D";
      const gcol=total>=20?"var(--ok)":total>=16?"var(--warn)":"var(--bad)";
      ev.innerHTML=`<b style="font-size:12.5px">総合評価</b>
        <div style="text-align:center;margin:8px 0">
          <span style="font-size:42px;font-weight:bold;color:${gcol};font-family:ui-monospace,monospace">${grade}</span>
          <span style="font-size:14px;opacity:.7"> (${total}/25)</span>
        </div>`+
        scores.map(([l,sc])=>`<div style="display:flex;align-items:center;gap:8px;margin:3px 0;font-size:11.5px">
          <span style="width:64px">${l}</span>
          <div style="flex:1;height:8px;background:rgba(0,0,0,.08);border-radius:4px;overflow:hidden">
            <div style="width:${sc*20}%;height:100%;background:${sc>=4?'#1E7F4F':sc>=3?'#E8A23B':'#C0392B'}"></div></div>
          <span style="width:14px;text-align:right">${sc}</span></div>`).join("")+
        `<div class="note" style="margin-top:6px">機体本来の素質を多角的に評価。実際の飛距離はパイロットの体力(⑥)と当日の風次第です。テストフライトの🤖オートで実測できます。</div>`;
    }
  }};
TOOL_LABELS.analysis="📊 総合解析";
TOOL_CAT.analysis="design";

// ================= 起動 =================
loadFromHash(); buildUI(); buildAircraft(); resize(); applyCam(); initTools(); wireThrottle();
// モード切替ボタン配線 + 初期は設計モード
document.getElementById("modeDesign").addEventListener("click",()=>setMode("design"));
document.getElementById("modeFlight").addEventListener("click",()=>setMode("flight"));
document.getElementById("settingsIcon").addEventListener("click",()=>toggleSettings());
document.getElementById("flightExit").addEventListener("click",()=>setMode("design"));
setMode("design");
if(window.ResizeObserver)new ResizeObserver(()=>resize()).observe(vp);
(function loop(){
  requestAnimationFrame(loop);
  if(propGroup)propGroup.rotation.z+=0.06;
  simTick();
  tickFx();
  if(appMode==="flight"){
    updateEnv();
    // 地面・グリッドをカメラ直下へ移動して描画切れを防ぐ
    const cx=camera.position.x, cz=camera.position.z;
    grid.position.set(Math.round(cx/20)*20, 0, Math.round(cz/20)*20);
    lake.position.set(cx,-0.02,cz);
  }
  renderer.render(scene,camera);
})();
</script>
</body>
</html>

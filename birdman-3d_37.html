<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鳥人間 機体設計シミュレーター 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --paper:#EDF1F5; --panel:#fff; --ink:#1B2A4A; --inksoft:#46587A;
    --line:#C7D2DE; --accent:#E8590C; --ok:#1E7F4F; --warn:#B8860B; --bad:#C0392B; --blue:#2C5F9E;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Hiragino Sans','Yu Gothic UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;align-items:baseline;gap:12px;padding:10px 14px;border-bottom:2px solid var(--ink);background:var(--paper);flex:0 0 auto}
  #modeSwitch{display:flex;gap:0;align-self:center;border:1.5px solid var(--ink);border-radius:8px;overflow:hidden}
  #modeSwitch button{font-size:13px;font-weight:bold;padding:6px 16px;border:none;background:#fff;color:var(--ink);cursor:pointer;transition:all .15s}
  #modeSwitch button.on{background:var(--ink);color:#fff}
  #modeSwitch button:not(.on):hover{background:var(--panel)}
  header h1{margin:0;font-size:17px;letter-spacing:1px}
  header .sub{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--inksoft)}
  #main{flex:1;display:flex;min-height:0}
  /* 左パネル */
  #ctrl{width:330px;flex:0 0 330px;overflow-y:auto;padding:10px;background:var(--paper);border-right:1px solid var(--line)}
  details{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--panel);overflow:hidden;transition:box-shadow .15s}
  details[open]{box-shadow:0 2px 8px rgba(0,0,0,.08)}
  summary{padding:11px 13px;font-size:13px;font-weight:700;cursor:pointer;list-style:none;display:flex;justify-content:space-between;user-select:none;align-items:center}
  summary::after{content:"▾";font-family:monospace;color:var(--inksoft);transition:transform .2s}
  details[open] summary{background:linear-gradient(135deg,var(--ink),#2a3b52);color:#fff}
  details[open] summary::after{content:"▾";color:#fff;transform:rotate(180deg)}
  summary:hover{background:#eef1f5}
  details[open] summary:hover{background:linear-gradient(135deg,var(--ink),#2a3b52)}
  .body{padding:11px 13px 6px}
  .tpl{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
  .tpl button{text-align:left;padding:7px 9px;border-radius:8px;cursor:pointer;border:1.5px solid var(--line);background:#fff;transition:all .12s;position:relative}
  .tpl button:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.08)}
  .tpl button.on{border-color:var(--accent);background:#FDF0E7;box-shadow:0 0 0 1px var(--accent) inset}
  .tpl button.on::after{content:"✓";position:absolute;top:5px;right:7px;color:var(--accent);font-weight:bold;font-size:12px}
  .tpl .n{font-size:12px;font-weight:700;color:var(--ink)}
  .tpl .d{font-size:10px;color:var(--inksoft);margin-top:2px;line-height:1.35}
  .sl{margin-bottom:9px}
  .sl .lab{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
  .sl .val{font-family:ui-monospace,Menlo,monospace;color:var(--accent);font-weight:700;background:#FDF0E7;padding:1px 7px;border-radius:5px}
  .sl input{width:100%;accent-color:var(--accent);height:6px;cursor:pointer}
  .note{font-size:11px;color:var(--inksoft);margin:2px 0 8px}
  /* 右側 */
  #right{flex:1;display:flex;flex-direction:column;min-width:0}
  #viewport{flex:1;position:relative;min-height:0;overflow:hidden}
  canvas{display:block}
  #views{position:absolute;top:10px;left:10px;display:flex;gap:6px}
  #views button{font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--line);background:rgba(255,255,255,.9);cursor:pointer;color:var(--ink)}
  #views button:hover{border-color:var(--accent)}
  #views button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  #fpvBtn.on,#hudBtn.on{background:var(--ink);color:#fff}
  #hint{position:absolute;bottom:8px;left:10px;font-size:10.5px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);opacity:.85}
  #hud{position:absolute;inset:0;pointer-events:none;display:none}
  #hud.on{display:block}
  #hud svg{width:100%;height:100%}
  /* 右側パネル: 高度・速度グラフ(灰色半透明・奥が透ける) */
  #sidePanel{position:absolute;top:10px;right:10px;bottom:78px;width:230px;display:none;
    flex-direction:column;gap:8px;pointer-events:none;z-index:3}
  #sidePanel.on{display:flex}
  #sidePanel .sp-box{flex:1;background:rgba(70,78,90,0.34);backdrop-filter:blur(2px);
    border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;min-height:0}
  #sidePanel .sp-title{color:#fff;font-size:13px;font-family:system-ui;font-weight:600;
    text-shadow:0 1px 3px rgba(0,0,0,.5);margin-bottom:4px;display:flex;justify-content:space-between;align-items:baseline}
  #sidePanel .sp-title span{font-family:ui-monospace,monospace;font-size:16px;color:#7CFC9A}
  #sidePanel canvas{flex:1;width:100%;min-height:0}
  /* 下部データバー(灰色半透明・奥が透ける) */
  #flightData{position:absolute;left:0;right:0;bottom:0;display:none;
    background:rgba(56,62,72,0.42);backdrop-filter:blur(3px);border-top:1px solid rgba(255,255,255,0.18);
    padding:9px 16px;pointer-events:none;z-index:3}
  #flightData.on{display:block}
  #flightData .fd-row{display:flex;gap:26px;justify-content:center;flex-wrap:wrap;font-family:ui-monospace,Menlo,monospace;align-items:flex-end}
  #flightData .fd-item{color:#dfe6ee;font-size:11px;text-shadow:0 1px 3px rgba(0,0,0,.5);text-align:center;line-height:1.5}
  #flightData .fd-item b{display:block;font-size:19px;color:#fff;font-weight:700}
  #flightData .fd-item.warn b{color:#ffc24d}
  #flightData .fd-item.bad b{color:#ff6b6b}
  #flightData .fd-wind{display:flex;flex-direction:column;align-items:center}
  #flightData .fd-windarrow{font-size:18px;color:#7CFC9A;line-height:1}
  #flightData .fd-msg{text-align:center;color:#fff;font-size:14px;margin-top:6px;font-family:system-ui;text-shadow:0 1px 4px rgba(0,0,0,.5)}
  /* 操縦パッド(左下・灰色半透明) */
  #ctrlOverlay{position:absolute;left:18px;bottom:88px;display:none;pointer-events:none;z-index:4;gap:14px;align-items:flex-end}
  #ctrlOverlay.on{display:flex}
  #ctrlOverlay .co-dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(2,40px);gap:5px;
    grid-template-areas:"lt up rt" "lt dn rt";pointer-events:auto}
  #ctrlOverlay .co-rud{display:flex;gap:5px;align-items:flex-end;pointer-events:auto}
  #ctrlOverlay .co-pad{display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,0.35);background:rgba(70,78,90,0.38);color:#fff;
    border-radius:9px;font-size:18px;font-weight:bold;cursor:pointer;user-select:none;
    backdrop-filter:blur(2px);transition:all .1s;min-height:40px}
  #ctrlOverlay .co-rud .co-pad{width:50px;height:48px}
  #ctrlOverlay .co-pad:active,#ctrlOverlay .co-pad.held{background:rgba(63,167,255,0.8);border-color:#fff;transform:scale(0.93)}
  /* 飛行モード: 設計パネルを畳んで画面最大化 */
  body.flight-mode #ctrl{display:none}
  body.flight-mode #metrics{display:none}
  body.flight-mode #toolbar{display:none !important}
  body.flight-mode #right{position:relative}
  /* 飛行モードは全画面(ヘッダーも隠す) */
  body.flight-mode header{display:none}
  body.flight-mode #main{height:100vh}
  /* 設定アイコン(左上・飛行モードのみ表示) */
  #settingsIcon{position:absolute;top:10px;left:10px;display:none;z-index:7;
    background:rgba(56,62,72,0.55);color:#fff;border:1px solid rgba(255,255,255,0.3);
    border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
    backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,.25)}
  #settingsIcon:hover{background:rgba(63,167,255,0.7)}
  body.flight-mode #settingsIcon{display:block}
  /* 戻るボタン(設計へ・飛行モードのみ右上) */
  #flightExit{position:absolute;top:10px;right:10px;display:none;z-index:7;
    background:rgba(56,62,72,0.55);color:#fff;border:1px solid rgba(255,255,255,0.3);
    border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
    backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,.25)}
  #flightExit:hover{background:rgba(63,167,255,0.7)}
  body.flight-mode #flightExit{display:block}
  /* 設定パネル(設定アイコンクリックで開く) */
  #settingsPanel{position:absolute;top:48px;left:10px;width:340px;max-height:calc(100% - 130px);
    overflow-y:auto;display:none;z-index:8;background:rgba(248,250,252,0.97);
    border:1px solid var(--line);border-radius:12px;padding:12px;
    box-shadow:0 8px 28px rgba(0,0,0,.28)}
  #settingsPanel.on{display:block}
  #settingsPanel .sp-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  #settingsPanel .sp-tabs button{flex:1;min-width:90px;font-size:12.5px;padding:7px 6px;border-radius:7px;
    border:1.5px solid var(--line);background:#fff;cursor:pointer;font-weight:600;color:var(--ink)}
  #settingsPanel .sp-tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  #settingsPanel .sp-content{font-size:12.5px}
  /* 飛行中の出力コントロール(下中央) */
  #throttle{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:none;
    background:rgba(56,62,72,0.5);border-radius:12px;padding:8px 16px;backdrop-filter:blur(3px);
    border:1px solid rgba(255,255,255,0.18);box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:5;min-width:280px}
  #throttle.on{display:block}
  #throttle .thr-label{color:#fff;font-size:13px;text-align:center;margin-bottom:6px;font-family:ui-monospace,monospace}
  #throttle .thr-label b{font-size:20px;color:#7CFC9A}
  #throttle .thr-row{display:flex;align-items:center;gap:10px}
  #throttle .thr-btn{width:42px;height:42px;border-radius:50%;border:none;background:#3FA7FF;color:#fff;
    font-size:24px;font-weight:bold;cursor:pointer;flex:0 0 auto;line-height:1;touch-action:none}
  #throttle .thr-btn:active{background:#2b8fe0;transform:scale(0.94)}
  #throttle input[type=range]{flex:1;height:8px;-webkit-appearance:none;appearance:none;
    background:linear-gradient(90deg,#3FA7FF,#7CFC9A);border-radius:4px;outline:none}
  #throttle input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;
    border-radius:50%;background:#fff;border:3px solid #3FA7FF;cursor:pointer}
  #throttle input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid #3FA7FF;cursor:pointer}
  #throttle .thr-hint{color:#9bb;font-size:10px;text-align:center;margin-top:3px}
  #throttle.auto{opacity:0.5;pointer-events:none}
  /* 操縦パッド */
  .ctrlpad{display:flex;gap:14px;margin-bottom:10px;align-items:flex-start}
  .ctrlcol{display:flex;flex-direction:column;align-items:center;gap:4px}
  .ctrllbl{font-size:10.5px;color:var(--ink);opacity:.7}
  .dpad{display:grid;grid-template-columns:repeat(3,42px);grid-template-rows:repeat(2,38px);gap:5px;
    grid-template-areas:"lt up rt" "lt dn rt"}
  .rudpad{display:flex;gap:5px}
  .pad{display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;
    border:1.5px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--ink);
    font-size:15px;font-weight:bold;user-select:none;height:100%;min-height:38px;min-width:42px;padding:0}
  .rudpad .pad{width:54px;height:42px}
  .pad small{font-size:8.5px;font-weight:normal;opacity:.65;margin-top:1px}
  .pad:active,.pad.held{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(0.96)}
  /* 解析バー */
  #metrics{flex:0 0 auto;display:flex;gap:8px;overflow-x:auto;padding:8px 10px;background:var(--paper);border-bottom:1px solid var(--line)}
  .met{min-width:128px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--ink);border-radius:6px;padding:6px 9px;flex:0 0 auto}
  .met .l{font-size:10px;color:var(--inksoft);white-space:nowrap}
  .met .v{font-family:ui-monospace,Menlo,monospace;font-size:16px;font-weight:700;white-space:nowrap}
  .met .h{font-size:9.5px;color:var(--inksoft);white-space:nowrap}
  .met.ok{border-left-color:var(--ok)} .met.ok .v{color:var(--ok)}
  .met.warn{border-left-color:var(--warn)} .met.warn .v{color:var(--warn)}
  .met.bad{border-left-color:var(--bad)} .met.bad .v{color:var(--bad)}
  /* ツールバー/パネル */
  #toolbar{flex:0 0 auto;display:flex;gap:6px;padding:6px 10px;min-height:42px;align-items:center;background:var(--paper);border-top:1px solid var(--line);overflow-x:auto}
  #toolbar button{font-size:12px;padding:5px 12px;border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer;white-space:nowrap;color:var(--ink)}
  #toolbar button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  #toolpanel{flex:0 0 auto;max-height:310px;overflow-y:auto;padding:10px 12px;background:#fff;border-top:1px solid var(--line)}
  .trow{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
  .tcol{flex:1 1 260px;min-width:240px}
  canvas.chart{width:100%;height:210px;border:1px solid var(--line);border-radius:6px;background:#fff;display:block}
  .tbtn{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer}
  .tbtn.sec{background:#fff;color:var(--ink)}
  table.cmp{border-collapse:collapse;font-size:11.5px;font-family:ui-monospace,monospace;width:100%}
  table.cmp td,table.cmp th{border:1px solid var(--line);padding:3px 8px;text-align:right;white-space:nowrap}
  table.cmp th{background:var(--paper)}
  .simstat{font-family:ui-monospace,monospace;font-size:12px;display:flex;gap:14px;flex-wrap:wrap;margin:6px 0}
  @media (max-width:760px){
    #main{flex-direction:column;overflow-y:auto}
    #ctrl{width:100%;flex:0 0 auto;max-height:45vh;border-right:none;border-bottom:1px solid var(--line)}
    #viewport{height:50vh;flex:0 0 auto}
  }
</style>
</head>
<body>
<header>
  <h1>鳥人間 機体設計シミュレーター <span style="color:var(--accent)">3D</span></h1>
  <div id="modeSwitch">
    <button id="modeDesign" class="on">🛠 設計</button>
    <button id="modeFlight">🛫 テストフライト</button>
  </div>
  <span class="sub">drag:回転 / wheel:ズーム / shift+drag:平行移動</span>
</header>
<div id="main">
  <div id="ctrl"></div>
  <div id="right">
    <div id="metrics"></div>
    <div id="viewport">
      <div id="views">
        <button data-v="iso">等角</button><button data-v="front">前</button>
        <button data-v="side">横</button><button data-v="top">上</button>
        <button data-v="fpv" id="fpvBtn">🧑‍✈ パイロット視点</button>
        <button id="hudBtn">📊 HUD計器</button>
      </div>
      <button id="settingsIcon">⚙ 設定</button>
      <button id="flightExit">🛠 設計に戻る</button>
      <div id="settingsPanel"></div>
      <div id="hud"></div>
      <div id="sidePanel">
        <div class="sp-box">
          <div class="sp-title">Altitude <span id="spAltVal"></span></div>
          <canvas id="spAlt"></canvas>
        </div>
        <div class="sp-box">
          <div class="sp-title">Speed <span id="spSpdVal"></span></div>
          <canvas id="spSpd"></canvas>
        </div>
      </div>
      <div id="flightData"></div>
      <div id="ctrlOverlay">
        <div class="co-dpad">
          <button class="co-pad" id="coElUp" style="grid-area:up;touch-action:none">▲</button>
          <button class="co-pad" id="coAlL" style="grid-area:lt;touch-action:none">◀</button>
          <button class="co-pad" id="coAlR" style="grid-area:rt;touch-action:none">▶</button>
          <button class="co-pad" id="coElDn" style="grid-area:dn;touch-action:none">▼</button>
        </div>
        <div class="co-rud">
          <button class="co-pad" id="coRdL" style="touch-action:none">⟲</button>
          <button class="co-pad" id="coRdR" style="touch-action:none">⟳</button>
        </div>
      </div>
      <div id="hint"></div>
    </div>
    <div id="toolbar"></div>
    <div id="toolpanel" style="display:none"></div>
  </div>
</div>

<script>
"use strict";
// ================= 状態とテンプレート =================
const st = {
  planform:"taper", span:28, rootChord:1.0, tipChord:0.55, wingX:1.5, dihedral:1.5, jig:"dihedral",
  airfoil:"dae31", washout:2.0, incidence:3.0, sweep:0,
  ribPitch:0.25, plankRatio:30,
  mode:"none", ailSpanFrac:0, ailChordFrac:0,
  config:"pylon", propDia:3.0, propBlades:2,
  posture:"semi", seatX:1.85, pilotW:60, cd0Add:0.002, powerMax:270, gear:"mono",
  segments:4, rootDia:110, tipDia:60, sparMod:230,
  drive:"chain",
  hShape:"taper", hSpan:3.4, hChord:0.6, tailArm:5.0,
  vShape:"swept", vHeight:1.3, vChord:0.6, elevRatio:1.0, rudRatio:1.0,
};

const TPL = {
  airfoil:[
    {id:"dae31",n:"DAE-31",d:"Drela設計。HPA定番・高効率",v:{airfoil:"dae31"}},
    {id:"dae21",n:"DAE-21",d:"やや薄翼で高速向き",v:{airfoil:"dae21"}},
    {id:"fx76",n:"FX 76-MP",d:"高揚力・低速安定。厚翼",v:{airfoil:"fx76"}},
    {id:"sd7037",n:"SD-7037",d:"広い速度域で安定",v:{airfoil:"sd7037"}},
    {id:"e387",n:"E-387",d:"実績豊富な中庸型",v:{airfoil:"e387"}},
    {id:"ag18",n:"AG-18",d:"薄翼・軽量。製作容易",v:{airfoil:"ag18"}}],
  wing:[
    {id:"rect",n:"矩形翼(製作優先)",d:"リブ共通化で楽。誘導抗力やや大",v:{planform:"rect",span:24,rootChord:0.95,tipChord:0.95}},
    {id:"taper",n:"緩テーパー翼(標準)",d:"上位機の定番。バランス型",v:{planform:"taper",span:28,rootChord:1.0,tipChord:0.55}},
    {id:"strong",n:"強テーパー高AR翼",d:"誘導抗力最小。翼端失速注意",v:{planform:"taper",span:32,rootChord:1.05,tipChord:0.35}},
    {id:"crescent",n:"クレセント翼",d:"楕円分布に近づける翼端形状",v:{planform:"crescent",span:30,rootChord:1.0,tipChord:0.4}},
    {id:"jumbo",n:"超大型機(34m)",d:"滞空特化。低翼面荷重だが桁・制御が難しい",v:{planform:"taper",span:34,rootChord:1.1,tipChord:0.42}},
    {id:"compact",n:"コンパクト機(22m)",d:"初参加・テスト機向け。製作量少・剛性出しやすい",v:{planform:"taper",span:22,rootChord:1.0,tipChord:0.6}}],
  jig:[
    {id:"dihedral",n:"ジグ上反角",d:"治具で根元から上反角を付けて組む。地上でも形が出る",v:{jig:"dihedral",dihedral:1.5}},
    {id:"flat",n:"フラット翼(自重たれ)",d:"治具は水平。地上では翼端が自重で垂れ、飛行揚力で持ち上がる",v:{jig:"flat",dihedral:0}}],
  rib:[
    {id:"dense",n:"密(180mm)",d:"翼型保持◎/重量増",v:{ribPitch:0.18}},
    {id:"std",n:"標準(250mm)",d:"多くのチームの標準",v:{ribPitch:0.25}},
    {id:"sparse",n:"疎(350mm)",d:"軽量/フィルム波打ち注意",v:{ribPitch:0.35}},
    {id:"ultra",n:"超密(120mm)",d:"翼型精度を極める。記録狙い上位校流/重い",v:{ribPitch:0.12}}],
  plank:[

// ================= 解析 =================
const lerp=(a,b,t)=>a+(b-a)*t;
function chordAt(p,t){
  const {planform,rootChord,tipChord}=p;
  if(planform==="rect")return rootChord;
  if(planform==="taper")return lerp(rootChord,tipChord,t);
  if(planform==="ellipse")return Math.max(tipChord*0.5,rootChord*Math.sqrt(Math.max(0,1-t*t)));
  if(t<0.5)return rootChord;
  const u=(t-0.5)/0.5;
  return lerp(rootChord,tipChord,1-Math.sqrt(Math.max(0,1-u*u)));
}

function wingGeom(p){
  const N=40;let S=0,c2=0;const half=p.span/2;
  for(let i=0;i<N;i++){const t=(i+0.5)/N;const c=chordAt(p,t);S+=c*(half/N)*2;c2+=c*c*(half/N)*2;}
  return {S,MAC:c2/S,AR:p.span*p.span/S};
}
function analyze(st){
  const g=9.81,rho=1.225;
  const {S,MAC,AR}=wingGeom(st);
  const half=st.span/2;
  const wingLE=st.wingX, xAC=wingLE+0.25*MAC, xHT=xAC+st.tailArm, xVT=xHT-0.1;
  const fusLen=xHT+st.hChord*0.8;
  let xProp;
  if(st.config==="tractor")xProp=0.05;
  else if(st.config==="pylon")xProp=wingLE+MAC+0.6;
  else if(st.config==="midboom")xProp=(wingLE+MAC+fusLen*0.85)/2; // 主翼〜尾翼間の桁の中間
  else xProp=fusLen*0.85;
  const Sh=st.hShape==="ellipse"?(Math.PI/4)*st.hSpan*st.hChord:st.hSpan*st.hChord*(st.hShape==="taper"?0.8:1);
  const Sv=st.vShape==="ellipse"?(Math.PI/4)*st.vHeight*st.vChord:st.vHeight*st.vChord*(st.vShape==="swept"?0.85:1);
  const nRibs=Math.floor(half/st.ribPitch)*2;
  const wRibs=nRibs*0.042, wPlank=S*(st.plankRatio/100)*0.26, wFilm=S*2.05*0.034;
  const avgDia=(st.rootDia+st.tipDia)/2, wSpar=st.span*0.004*avgDia*(0.92+0.08*(st.sparMod||230)/230), wJoints=(st.segments-1)*2*0.18;
  const wAil=st.mode==="none"?0:st.ailSpanFrac*st.span*0.25+0.3;
  const wWing=wRibs+wPlank+wFilm+wSpar+wJoints+wAil;
  const wHT=Sh*0.55+(st.elevRatio<1?0.15:0.05), wVT=Sv*0.55+(st.rudRatio<1?0.12:0.05);
  const boomLen=fusLen-(wingLE+MAC*0.6), wBoom=Math.max(0,boomLen)*0.32;
  const wCockpit=3.2+(st.posture==="upright"?0.3:0);
  const driveDist=Math.abs(xProp-st.seatX)+(st.config==="pylon"?1.2:0);
  const wDrive=1.2+driveDist*0.35, wProp=0.45+st.propDia*0.18, wMisc=1.0;
  const wEmpty=wWing+wHT+wVT+wBoom+wCockpit+wDrive+wProp+wMisc;
  const W=(wEmpty+st.pilotW)*g;
  const pilotCGx=st.seatX+(st.posture==="upright"?-0.05:st.posture==="semi"?-0.15:-0.25);
  const items=[
    {n:"主翼",w:wWing,x:xAC+0.02*MAC},{n:"水平尾翼",w:wHT,x:xHT},{n:"垂直尾翼",w:wVT,x:xVT},
    {n:"ブーム",w:wBoom,x:(wingLE+MAC*0.6+fusLen)/2},{n:"コックピット",w:wCockpit,x:st.seatX+0.1},
    {n:"駆動系",w:wDrive,x:(st.seatX+xProp)/2},{n:"プロペラ",w:wProp,x:xProp},
    {n:"その他",w:wMisc,x:st.seatX},{n:"パイロット",w:st.pilotW,x:pilotCGx}];
  const totalM=items.reduce((s,i)=>s+i.w,0);
  const xCG=items.reduce((s,i)=>s+i.w*i.x,0)/totalM;
  const lh=xHT-xCG, Vh=Sh*lh/(S*MAC), Vv=Sv*(xVT-xCG)/(S*st.span);
  const tailEff=0.9*(st.elevRatio===1?1:0.85);
  const xNP=xAC+MAC*Vh*tailEff*0.72;
  const SM=(xNP-xCG)/MAC*100;
  const CL=1.0, V=Math.sqrt(2*W/(rho*S*CL));
  const CD0=0.014+st.cd0Add+(st.config==="pylon"?0.0015:0)+(st.mode!=="none"?0.0008:0);
  const e=st.planform==="rect"?0.82:(st.planform==="crescent"||st.planform==="ellipse")?0.92:0.88;
  const CDi=CL*CL/(Math.PI*AR*e);
  const D=0.5*rho*V*V*S*(CD0+CDi);
  const propEff=st.config==="pylon"?0.87:st.config==="tractor"?0.82:0.8;
  const Preq=D*V/propEff, margin=st.powerMax-Preq;
  const Mroot=0.106*(W-wWing*g)*st.span;
  // 許容曲げモーメント: 径³ × 弾性率比(高弾性率CFRPほど強い。基準230GPa)
  const modFac=(st.sparMod||230)/230;
  const Mallow=0.0033*Math.pow(st.rootDia,3)*modFac;
  const sparSF=Mallow/Mroot;
  return {S,MAC,AR,Sh,Sv,wEmpty,W:W/g,items,xCG,xAC,xNP,SM,Vh,Vv,V,Preq,margin,nRibs,wSpar,sparSF,fusLen,xHT,xVT,xProp,wingLE,pilotCGx,lh,driveDist};
}

    c.beginPath(); c.moveTo(x,y); c.quadraticCurveTo(x+w/2,y+4,x+w,y); c.stroke();

  for(let i=0;i<90;i++){ // 白い波頭
    const x=Math.random()*256,y=Math.random()*256,w=14+Math.random()*40;
    c.strokeStyle=`rgba(255,255,255,${(0.06+Math.random()*0.12).toFixed(3)})`;

    c.beginPath(); c.moveTo(x,y); c.quadraticCurveTo(x+w/2,y+3,x+w,y); c.stroke();
  }
  const tx=new THREE.CanvasTexture(cv);
  tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(320,320);
  return tx;
}

// 西=比良山地(高く険しい)、東=伊吹/鈴鹿(なだらか)、奥=北の山々
function mountainRing(){
  // 西岸(機体左, x負): 比良山地 — 高く連なる
  for(let i=0;i<18;i++){
    const dist=3200+Math.random()*1800;
    const pz=300-i*420+Math.random()*200;       // コースに沿って南北に展開
    const h=420+Math.random()*380;
    const shade=0x6a8472+(i%3)*0x040404;
    hills.add(mountain(-dist*0.5,pz,300+Math.random()*260,h,[0x73907c,0x5f7d6e,0x82998a][i%3]));
  }
  // 東岸(機体右, x正): 伊吹・鈴鹿 — ややなだらか・遠い
  for(let i=0;i<16;i++){
    const dist=3600+Math.random()*2000;
    const pz=200-i*460+Math.random()*220;
    const h=300+Math.random()*320;
    hills.add(mountain(dist*0.5,pz,280+Math.random()*240,h,[0x7d9486,0x6b8779,0x8a9e91][i%3]));
  }

// テーパー管ロフト(桁用): スパン方向の頂点を持つ一体ジオメトリ
function loftTube(stn,seg=10){
  const pos=[],idx=[];
  for(let i=0;i<stn.length;i++){const s=stn[i];
    for(let j=0;j<seg;j++){const a=j/seg*Math.PI*2;
      pos.push(s.x, s.y+s.r*Math.cos(a), s.z+s.r*Math.sin(a));
    }}
  for(let i=0;i<stn.length-1;i++)for(let j=0;j<seg;j++){
    const a=i*seg+j,b=i*seg+(j+1)%seg,c=(i+1)*seg+j,d=(i+1)*seg+(j+1)%seg;
    idx.push(a,c,b, b,c,d);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx); g.computeVertexNormals();
  return g;
}

// 翼型 (NACA風 4桁近似 / camber 4%, 厚み 11%)
function airfoilPts(n=16){
  const up=[], lo=[];
  for(let i=0;i<=n;i++){
    const x = 0.5*(1-Math.cos(Math.PI*i/n)); // cos分布
    const t=0.11, m=0.04, p=0.4;
    const yt=5*t*(0.2969*Math.sqrt(x)-0.126*x-0.3516*x*x+0.2843*x**3-0.1036*x**4);
    const yc = x<p ? m/(p*p)*(2*p*x-x*x) : m/((1-p)**2)*((1-2*p)+2*p*x-x*x);
    up.push([x, yc+yt]); lo.push([x, yc-yt]);
  }
  return {up, lo}; // x:0(前縁)→1(後縁), y:上下
}
const AF = airfoilPts();

// 翼ロフト(BufferGeometry): stations = [{x, chord, y0, z0}]  プロファイル割合 [f0,f1] を張る
function loftWing(stations, f0, f1, closed){
  // 断面ループ: 上面 f1→f0、(前縁経由) 下面 f0→f1
  const prof=[];
  const seg=(arr,a,b,rev)=>{
    const pts=arr.filter(p=>p[0]>=a-1e-6 && p[0]<=b+1e-6);
    return rev?[...pts].reverse():pts;
  };
  prof.push(...seg(AF.up,f0,f1,true), ...seg(AF.lo,f0,f1,false));
  const m=prof.length, n=stations.length;
  const pos=[], idx=[];
  for(let i=0;i<n;i++){
    const s=stations[i];
    for(let j=0;j<m;j++){
      pos.push(s.x, s.y0+prof[j][1]*s.chord, s.z0+prof[j][0]*s.chord);
    }
  }
  for(let i=0;i<n-1;i++)for(let j=0;j<m-1;j++){
    const a=i*m+j,b=a+1,c=a+m,d=c+1;
    idx.push(a,c,b, b,c,d);
  }
  if(closed){ // 翼端を閉じる(扇)
    const base=(n-1)*m;
    for(let j=0;j<m-2;j++) idx.push(base,base+j+1,base+j+2);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx); g.computeVertexNormals();
  return g;
}

let bendFn=null;
const bend=(y)=>bendFn?bendFn(Math.abs(y)):0;
let flexReg=null, flexN=0;
function applyFlex(fl,fi){ // fl=揚力倍率, fi=慣性(自重)倍率。駐機=(0,1)で翼端が垂れる
  if(fi===undefined)fi=fl;
  if(!flexReg||!flexReg.dL)return;
  const key=Math.round(fl*100)*100000+Math.round(fi*100);
  if(key===flexN)return;
  flexN=key;
  const DL=flexReg.dL,DW=flexReg.dW;
  for(const it of flexReg.items){
    if(it.rigid){it.rigid.position.y=it.baseY+fl*DL(it.span)-fi*DW(it.span);}
    else{
      const a=it.attr.array,b=it.base;
      for(let i=0;i<a.length;i+=3)a[i+1]=b[i+1]+fl*DL(b[i])-fi*DW(b[i]);
      it.attr.needsUpdate=true;
    }
  }
}
function wingStations(p, side, N=22){ // side: +1/-1
  const half=p.span/2, dih=(p.jig==="flat"?0:p.dihedral)*Math.PI/180;
  const arr=[];
  for(let i=0;i<=N;i++){
    const t=i/N, y=t*half;
    arr.push({x:side*y, chord:chordAt(p,t), y0:Math.tan(dih)*y+bend(y), z0:0});
  }
  return arr;
}

// ================= 機体ビルド =================
let aircraft=null, propGroup=null, an=null;

function buildAircraft(){
  if(aircraft){scene.remove(aircraft); aircraft.traverse(o=>{if(o.geometry)o.geometry.dispose();});}
  an = analyze(st);
  bendFn=null; // たわみはapplyFlex()による動的変形で表現
  const A = new THREE.Group();
  const hWing = st.posture==="upright"?2.4:2.0;
  const hBoom = hWing-0.15;
  const half = st.span/2;

  // ---- 主翼グループ(z=wingX, y=hWing) ----
  const wg=new THREE.Group(); wg.position.set(0,hWing,st.wingX);
  for(const side of [1,-1]){
    const stn=wingStations(st,side);
    // フィルム全面
    wg.add(new THREE.Mesh(loftWing(stn,0,1,true), MAT.film));
    // プランク(前縁〜plankRatio%)
    wg.add(new THREE.Mesh(loftWing(stn,0,st.plankRatio/100,false), MAT.plank));
    // エルロン
    if(st.mode!=="none"){
      const yIn=half*(1-st.ailSpanFrac);
      const sub=[];
      const N=8;
      for(let i=0;i<=N;i++){
        const y=lerp(yIn,half*0.98,i/N), t=y/half;
        sub.push({x:side*y,chord:chordAt(st,t),y0:Math.tan(effDih())*y+bend(y),z0:0});
      }
      wg.add(new THREE.Mesh(loftWing(sub,1-st.ailChordFrac,1,false), MAT.ctrl));
    }
    // リブ
    for(let y=st.ribPitch;y<half*0.995;y+=st.ribPitch){
      const t=y/half, c=chordAt(st,t);
      const sh=new THREE.Shape();
      AF.up.slice().reverse().forEach((p,i)=>{i===0?sh.moveTo(p[0]*c,p[1]*c):sh.lineTo(p[0]*c,p[1]*c);});
      AF.lo.forEach(p=>sh.lineTo(p[0]*c,p[1]*c));
      const rib=new THREE.Mesh(new THREE.ShapeGeometry(sh), MAT.rib);
      rib.rotation.y=-Math.PI/2;
      rib.position.set(side*y, Math.tan(effDih())*y+bend(y), 0);
      wg.add(rib);
    }
    // 主桁(30%コード位置): たわみ曲線に沿って細分割し連続したしなりを表現
    const segLen=half/st.segments;
    const dihT=Math.tan(effDih());
    const sparP=y=>new THREE.Vector3(side*y, dihT*y+bend(y)+0.03, st.rootChord*0.3);
    const sparR=y=>lerp(st.rootDia,st.tipDia,y/half)/2000;
    const sparDir=y=>sparP(Math.min(half,y+0.06)).clone().sub(sparP(Math.max(0,y-0.06))).normalize();
    const UP=new THREE.Vector3(0,1,0);
    const alongSpar=(mesh,y)=>{mesh.position.copy(sparP(y));mesh.quaternion.setFromUnitVectors(UP,sparDir(y));};
    const NSUB=8; // 1分割あたりの細分数
    {
      const stn=[];
      for(let i=0;i<=st.segments*NSUB;i++){
        const y=half*i/(st.segments*NSUB);
        stn.push({x:side*y, y:dihT*y+0.03, z:st.rootChord*0.3, r:sparR(y)});
      }
      wg.add(new THREE.Mesh(loftTube(stn,10), MAT.spar)); // 一体桁(頂点変形でしなる)
    }
    for(let s=1;s<st.segments;s++){
      { // 接合部スリーブ(局所接線に沿わせて滑らかに)
        const jy=s*segLen, rj=sparR(jy)*1.28;
        const sleeve=new THREE.Mesh(new THREE.CylinderGeometry(rj,rj,0.20,14), MAT.joint);
        alongSpar(sleeve,jy); wg.add(sleeve);
        const c1=new THREE.Mesh(new THREE.CylinderGeometry(rj,sparR(jy-0.2),0.10,14), MAT.joint);
        alongSpar(c1,jy-0.15); wg.add(c1);
        const c2=new THREE.Mesh(new THREE.CylinderGeometry(sparR(jy+0.2),rj,0.10,14), MAT.joint);
        alongSpar(c2,jy+0.15); wg.add(c2);
      }
    }
    void segLen;
  }
  A.add(wg);

  // ---- 揚力追従たわみ: 翼グループの基準形状を記録 ----
  flexReg={items:[]};
  {
    const fb=computeFlexBasis(), hf=st.span/2;
    flexReg.dL=y=>interpA(fb.ys,fb.dL,Math.min(Math.abs(y),hf));
    flexReg.dW=y=>interpA(fb.ys,fb.dW,Math.min(Math.abs(y),hf));
    wg.traverse(o=>{
      if(!o.geometry||!o.geometry.attributes||!o.geometry.attributes.position)return;
      if(Math.abs(o.position.x)>1e-6)
        flexReg.items.push({rigid:o,baseY:o.position.y,span:Math.abs(o.position.x)});
      else{
        const attr=o.geometry.attributes.position;
        flexReg.items.push({attr,base:new Float32Array(attr.array)});
      }
    });
  }
  flexN=-1; applyFlex(loadPrm&&loadPrm.apply?loadPrm.n:0, loadPrm&&loadPrm.apply?loadPrm.n:1);

  // ---- 胴体・コックピット・パイロット ----
  const seat=st.seatX;
  // フレーム(機首→座席→ブーム前端)
  const framePts=[new THREE.Vector3(0,1.2,Math.max(0.1,seat-1.0)), new THREE.Vector3(0,0.6,seat+0.3), new THREE.Vector3(0,1.5,seat+1.2)];
  const frame=new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(framePts),16,0.035,8), MAT.frame);
  A.add(frame);
  // フェアリング
  const fair=new THREE.Mesh(new THREE.SphereGeometry(1,20,14), MAT.fair);
  fair.scale.set(0.55, st.posture==="upright"?1.05:0.85, 1.45);
  fair.position.set(0,0.95,seat-0.05); A.add(fair);
  // ---- 着陸装置 ----
  if(st.gear&&st.gear!=="none"){
    const wheelMat=new THREE.MeshPhongMaterial({color:0x23282e});
    const strutMat=MAT.frame;
    const mkWheel=(wx,wz,rad)=>{
      const wg2=new THREE.Group();
      const wheel=new THREE.Mesh(new THREE.TorusGeometry(rad,rad*0.35,8,16),wheelMat);
      wheel.rotation.y=Math.PI/2; wg2.add(wheel);
      const hub=new THREE.Mesh(new THREE.CylinderGeometry(rad*0.25,rad*0.25,0.04,8),wheelMat);
      hub.rotation.z=Math.PI/2; wg2.add(hub);
      const strut=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.55,6),strutMat);
      strut.position.set(0,0.28,0); wg2.add(strut);
      wg2.position.set(wx,rad,wz);
      A.add(wg2);
    };
    if(st.gear==="tri"){
      mkWheel(0,seat-0.55,0.13);              // 前輪
      mkWheel(0.55,seat+0.45,0.15);           // 主輪(左右)
      mkWheel(-0.55,seat+0.45,0.15);
    } else { // mono: 単輪+尾輪
      mkWheel(0,seat+0.05,0.16);              // 主輪
      mkWheel(0,an.fusLen-0.3,0.07);          // 尾輪
    }
  }
  // テールブーム(座席後方→尾翼)
  const boom=new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.03,1,10), MAT.frame);
  const b0=new THREE.Vector3(0,1.5,seat+1.2), b1=new THREE.Vector3(0,hBoom,an.fusLen);
  const dir=b1.clone().sub(b0);
  boom.scale.y=dir.length(); boom.position.copy(b0.clone().add(b1).multiplyScalar(0.5));
  boom.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  A.add(boom);
  // パイロット(姿勢別の体節をチューブで)
  const P=(z,y)=>new THREE.Vector3(0,y,z);
  let body;
  // 頭=後上方、足(ペダル)=機首側 ※進行方向は-z
  if(st.posture==="upright") body=[P(seat+0.02,1.55),P(seat+0.02,1.30),P(seat,0.68),P(seat-0.30,0.80),P(seat-0.28,0.42)];
  else if(st.posture==="semi") body=[P(seat+0.35,1.18),P(seat+0.18,1.02),P(seat,0.62),P(seat-0.50,0.85),P(seat-0.80,0.58)];
  else body=[P(seat+0.50,0.86),P(seat+0.30,0.78),P(seat,0.60),P(seat-0.55,0.92),P(seat-0.95,0.68)];
  A.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(body),20,0.075,8), MAT.pilot));
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.11,12,10), MAT.pilot);
  head.position.copy(body[0]).add(new THREE.Vector3(0,0.13,0.03)); A.add(head);
  // クランク
  const crank=new THREE.Mesh(new THREE.TorusGeometry(0.16,0.02,8,20), MAT.spar);
  crank.rotation.y=Math.PI/2; crank.position.copy(body[4]); A.add(crank);

  // ---- プロペラと駆動 ----
  const boomYAt=z=>{const u=Math.max(0,Math.min(1,(z-(seat+1.2))/(an.fusLen-(seat+1.2))));return 1.5+(hBoom-1.5)*u;};
  const propH = st.config==="pylon"?hBoom+0.9 : st.config==="tractor"?1.3 : st.config==="midboom"?boomYAt(an.xProp) : hBoom;
  propGroup=new THREE.Group(); propGroup.position.set(0,propH,an.xProp);
  const hub=new THREE.Mesh(new THREE.SphereGeometry(0.07,10,8), MAT.spar); propGroup.add(hub);
  for(const s of [1,-1]){
    const bl=new THREE.Mesh(new THREE.BoxGeometry(0.09,st.propDia/2*0.96,0.018), MAT.prop);
    bl.position.y=s*st.propDia/4; bl.rotation.y=s*0.25;
    const tw=new THREE.Group(); tw.add(bl); propGroup.add(tw);
  }
  // スピナー
  const spin=new THREE.Mesh(new THREE.ConeGeometry(0.07,0.22,10), MAT.frame);
  spin.rotation.x=st.config==="tractor"?-Math.PI/2:Math.PI/2;
  spin.position.z=st.config==="tractor"?-0.12:0.12; propGroup.add(spin);
  A.add(propGroup);
  // パイロン支柱
  if(st.config==="pylon"){
    const py=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,propH-hBoom,8), MAT.frame);
    py.position.set(0,(propH+hBoom)/2,an.xProp); A.add(py);
  }
  // 駆動系(クランク→プロペラ軸)
  const crankP=body[4].clone(), propP=new THREE.Vector3(0,propH,an.xProp);
  const midP=new THREE.Vector3(0, Math.min(Math.max(crankP.y,0.9),propH), (crankP.z+propP.z)/2);
  if(st.drive==="shaft"){
    // シャフト+ベベルギアボックス
    A.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3([crankP,midP,propP]),24,0.020,8), MAT.frame));
    for(const pt of [crankP,propP]){
      const gb=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.10,12), MAT.spar);
      gb.position.copy(pt); A.add(gb);
    }
  } else {
    // ねじりチェーン: スプロケット2枚+往復2本のチェーンライン
    const sprk=new THREE.Mesh(new THREE.TorusGeometry(0.07,0.015,8,18), MAT.spar);
    sprk.rotation.y=Math.PI/2; sprk.position.copy(propP); A.add(sprk);
    const chainMat=new THREE.MeshPhongMaterial({color:0x33383f});
    for(const off of [1,-1]){
      const p1=crankP.clone().add(new THREE.Vector3(0,off*0.15,0));
      const p2=midP.clone().add(new THREE.Vector3(0,off*0.09,0));
      const p3=propP.clone().add(new THREE.Vector3(0,off*0.06,0));
      A.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3([p1,p2,p3]),24,0.011,6), chainMat));
    }
  }

  // ---- 水平尾翼 ----
  const hHalf=st.hSpan/2, hLE=an.xHT-st.hChord*0.4;
  const mkHT=(f0,f1,mat)=>{ // 平面形を薄板ロフトで
    const N=12, stn=[];
    for(let i=0;i<=N;i++){
      const u=i/N*2-1; // -1..1
      const ax=Math.abs(u);
      let le=hLE, c=st.hChord;
      if(st.hShape==="taper"){le=hLE+st.hChord*0.25*ax; c=st.hChord*(1-0.4*ax);}
      else if(st.hShape==="ellipse"){const w=Math.sqrt(Math.max(0.05,1-ax*ax)); le=hLE+st.hChord*(1-w)/2; c=st.hChord*w;}
      stn.push({x:u*hHalf, chord:c, y0:hBoom+0.02-st.wingX*0, z0:le-st.wingX*0});
    }
    // loftWingはz0+x*chordで張る: 薄い対称翼型を使う
    const save=[AF.up,AF.lo];
    const thin=airfoilThin();
    AF.up=thin.up; AF.lo=thin.lo;
    const g=loftWing(stn.map(s=>({x:s.x,chord:s.chord,y0:s.y0,z0:s.z0})),f0,f1,false);
    AF.up=save[0]; AF.lo=save[1];
    return new THREE.Mesh(g,mat);
  };
  if(st.elevRatio<1){
    A.add(mkHT(0,1-st.elevRatio,MAT.tailskin));
    A.add(mkHT(1-st.elevRatio,1,MAT.ctrl));
  } else {
    const m=mkHT(0,1,MAT.ctrl); A.add(m);
  }

  // ---- 垂直尾翼 ----
  const vx=an.xVT, vc=st.vChord, vh=st.vHeight;
  const vsh=new THREE.Shape();
  if(st.vShape==="swept"){
    vsh.moveTo(-vc*0.2,0); vsh.lineTo(vc*0.55,vh); vsh.lineTo(vc*1.05,vh); vsh.lineTo(vc*0.8,0);
  } else if(st.vShape==="ellipse"){
    vsh.moveTo(0,0); vsh.quadraticCurveTo(0,vh,vc*0.5,vh); vsh.quadraticCurveTo(vc,vh,vc,0);
  } else {
    vsh.moveTo(0,0); vsh.lineTo(0,vh); vsh.lineTo(vc,vh); vsh.lineTo(vc,0);
  }
  vsh.closePath();
  const vt=new THREE.Mesh(new THREE.ExtrudeGeometry(vsh,{depth:0.03,bevelEnabled:false}),
    st.rudRatio===1?MAT.ctrl:MAT.tailskin);
  vt.rotation.y=-Math.PI/2; vt.position.set(0.015,hBoom,vx);
  A.add(vt);
  if(st.rudRatio<1){ // ラダー部
    const rx=vc*(1-st.rudRatio);
    const rsh=new THREE.Shape();
    rsh.moveTo(rx,0.03); rsh.lineTo(rx+vc*0.22,vh*0.95); rsh.lineTo(vc*(st.vShape==="swept"?1.0:0.98),vh*0.95); rsh.lineTo(vc*(st.vShape==="swept"?0.79:0.99),0.03);
    rsh.closePath();
    const rd=new THREE.Mesh(new THREE.ExtrudeGeometry(rsh,{depth:0.035,bevelEnabled:false}), MAT.ctrl);
    rd.rotation.y=-Math.PI/2; rd.position.set(0.018,hBoom,vx);
    A.add(rd);
  }

  // ---- CG / NP / AC マーカー ----
  const mk=(x,col,labTxt,h)=>{
    const g=new THREE.Group();
    const s=new THREE.Mesh(new THREE.SphereGeometry(0.09,12,10), new THREE.MeshBasicMaterial({color:col}));
    g.add(s);
    const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,-(h),0)]),
      new THREE.LineDashedMaterial({color:col,dashSize:0.15,gapSize:0.1}));
    ln.computeLineDistances(); g.add(ln);
    const lb=label(labTxt, "#"+col.toString(16).padStart(6,"0")); lb.position.y=0.35; g.add(lb);
    g.position.set(0,h,x*0+0); g.position.z=x; g.position.y=h;
    return g;
  };
  A.add(mk(an.xCG,0xe8590c,"CG",hWing+0.6));
  A.add(mk(an.xNP,0x2c5f9e,"NP",hWing+0.95));
  scene.add(A); aircraft=A;
  // モードに応じた配置: 設計=原点(グリッド床)、飛行=デッキ上。飛行シミュ中は触らない。
  if(!simPlay){
    if(appMode==="flight"){A.position.set(0,10.2,0);}
    else {A.position.set(0,0,0);}
  }
  updateMetrics();
}

// 薄翼型(尾翼用 対称8%)
function airfoilThin(){
  const up=[],lo=[],n=10;
  for(let i=0;i<=n;i++){
    const x=0.5*(1-Math.cos(Math.PI*i/n));
    const yt=5*0.08*(0.2969*Math.sqrt(x)-0.126*x-0.3516*x*x+0.2843*x**3-0.1036*x**4);
    up.push([x,yt]); lo.push([x,-yt]);
  }
  return {up,lo};
}

// ================= カメラ操作(自作オービット) =================
const orbit={theta:-0.7, phi:1.15, dist:26, target:new THREE.Vector3(0,2,0)};
let fpvMode=false, fpvState=null;
let appMode="design"; // "design" or "flight"
function zoomRange(){ // モード別ズーム範囲
  return appMode==="design" ? {min:Math.max(3,st.span*0.12), max:Math.max(50,st.span*2.2)}
                            : {min:4, max:300};
}
function applyCam(){
  if(fpvMode&&fpvState){ applyFPV(); return; }
  const {theta,phi,dist,target}=orbit;
  camera.position.set(
    target.x+dist*Math.sin(phi)*Math.sin(theta),
    target.y+dist*Math.cos(phi),
    target.z+dist*Math.sin(phi)*Math.cos(theta));
  camera.lookAt(target);
}
// パイロット視点: 機体姿勢に追従し、コックピット位置から前方(−Z)を見る
function applyFPV(){
  const s=fpvState;
  const eye=new THREE.Vector3(s.x, s.y+1.15, s.z+0.2);     // 目の高さ
  const eul=new THREE.Euler(s.gam, -s.psi, s.phi, "YXZ");
  const fwd=new THREE.Vector3(0,0,-1).applyEuler(eul);
  const up=new THREE.Vector3(0,1,0).applyEuler(eul);
  camera.position.copy(eye);
  camera.up.copy(up);
  camera.lookAt(eye.clone().add(fwd));
}
function setFPV(on){
  fpvMode=on;
  if(!on){camera.up.set(0,1,0);}
  const b=document.getElementById("fpvBtn");
  if(b)b.className=on?"on":"";
  // 飛行中でなければ静止機体に対してFPVを当てる
  if(on&&!fpvState)fpvState={x:0,y:1.0,z:0,gam:0,psi:0,phi:0};
  applyCam();
}
let drag=null;
const cv=renderer.domElement;
cv.addEventListener("pointerdown",e=>{drag={x:e.clientX,y:e.clientY,shift:e.shiftKey};cv.setPointerCapture(e.pointerId);});
cv.addEventListener("pointermove",e=>{
  if(!drag)return;
  const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
  if(drag.shift||e.buttons===2){
    const s=orbit.dist*0.0012;
    const right=new THREE.Vector3().setFromMatrixColumn(camera.matrix,0);
    const up=new THREE.Vector3().setFromMatrixColumn(camera.matrix,1);
    orbit.target.addScaledVector(right,-dx*s).addScaledVector(up,dy*s);
  } else {
    orbit.theta-=dx*0.006;
    orbit.phi=Math.min(Math.PI-0.05,Math.max(0.05,orbit.phi-dy*0.006));
  }
  drag={x:e.clientX,y:e.clientY,shift:drag.shift}; applyCam();
});
cv.addEventListener("pointerup",()=>drag=null);
cv.addEventListener("wheel",e=>{e.preventDefault();const z=zoomRange();orbit.dist=Math.min(z.max,Math.max(z.min,orbit.dist*(1+e.deltaY*0.0012)));applyCam();},{passive:false});
cv.addEventListener("contextmenu",e=>e.preventDefault());
// ピンチズーム
let pinch=null;
cv.addEventListener("touchmove",e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinch){const z=zoomRange();orbit.dist=Math.min(z.max,Math.max(z.min,orbit.dist*pinch/d));}
    pinch=d; applyCam(); e.preventDefault();
  }
},{passive:false});
cv.addEventListener("touchend",()=>pinch=null);

{const hb=document.getElementById("hudBtn");if(hb){hb.className="";hb.addEventListener("click",()=>{hudEnabled=!hudEnabled;hb.className=hudEnabled?"on":"";const h=document.getElementById("hud");if(h&&!hudEnabled)h.classList.remove("on");});}}

// ===== 部位フォーカス: 設定中のセクションに対応する機体部位へカメラを寄せる =====
function partTarget(secKey){
  const a=an||analyze(st);
  const seat=st.seatX, half=st.span/2;
  // [x(右+), y(上), z(機尾+), dist] 機体座標系
  switch(secKey){
    case "wing":  return {t:new THREE.Vector3(half*0.45,0.3,a.wingLE+a.MAC*0.4), dist:Math.max(14,st.span*0.55)};
    case "rib":   return {t:new THREE.Vector3(half*0.3,0.2,a.wingLE+a.MAC*0.4), dist:Math.max(8,st.span*0.32)};
    case "plank": return {t:new THREE.Vector3(half*0.15,0.25,a.wingLE+a.MAC*0.2), dist:6};
    case "ail":   return {t:new THREE.Vector3(half*0.85,0.2,a.wingLE+a.MAC*0.7), dist:Math.max(7,st.span*0.30)};
    case "prop":  return {t:new THREE.Vector3(0,1.0,a.xProp), dist:6.5};
    case "pilot": return {t:new THREE.Vector3(0,0.9,seat), dist:5.5};
    case "spar":  return {t:new THREE.Vector3(half*0.4,0.1,a.wingLE+a.MAC*0.3), dist:Math.max(12,st.span*0.5)};
    case "ht":    return {t:new THREE.Vector3(0,0.5,a.xHT), dist:5.5};
    case "vt":    return {t:new THREE.Vector3(0,0.9,a.xVT), dist:5.5};
    default:      return {t:new THREE.Vector3(0,0.5,a.wingLE+a.MAC*0.4), dist:Math.max(16,st.span*0.8)};
  }
}
let focusAnim=null;
function focusPart(secKey){
  if(simPlay||fpvMode||appMode!=="design")return;  // 飛行中・FPV・飛行モードでは無効
  const p=partTarget(secKey);
  if(!p)return;
  // 寄り(部位に応じた角度: 翼は上から、尾翼は横から)
  const ang={wing:[-0.5,1.0],rib:[-0.4,1.05],plank:[-0.6,1.1],ail:[-0.9,1.1],
    prop:[Math.PI*0.85,1.45],pilot:[Math.PI/2,1.45],spar:[-0.45,1.0],
    ht:[Math.PI*0.75,1.4],vt:[Math.PI/2,1.3]}[secKey]||[-0.7,1.15];
  const from={th:orbit.theta,phi:orbit.phi,d:orbit.dist,t:orbit.target.clone()};
  const to={th:ang[0],phi:ang[1],d:p.dist,t:p.t};
  if(focusAnim)cancelAnimationFrame(focusAnim);
  const t0=performance.now(), dur=420;
  (function step(){
    const k=Math.min(1,(performance.now()-t0)/dur);
    const e=k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2; // ease-in-out
    orbit.theta=from.th+(to.th-from.th)*e;
    orbit.phi=from.phi+(to.phi-from.phi)*e;
    orbit.dist=from.d+(to.d-from.d)*e;
    orbit.target.lerpVectors(from.t,to.t,e);
    applyCam();
    if(k<1)focusAnim=requestAnimationFrame(step);
  })();
}

// ---- 空力定数(analyzeと同一式) ----
function aeroConsts(){
  const af=airfoil();
  // 形状抗力: 翼型固有のcd0 + 翼厚・装備による上乗せ
  const CD0=af.cd0+0.004+st.cd0Add+(st.config==="pylon"?0.0015:0)+(st.mode!=="none"?0.0008:0)
    +(af.thick-0.092)*0.02;                          // 厚翼ほど形状抗力増
  // 翼効率e: 平面形 + 捻り下げ(washout)で翼端失速を防ぎ分布改善
  let e=st.planform==="rect"?0.82:(st.planform==="crescent"||st.planform==="ellipse")?0.92:0.88;
  e+=Math.min(0.03,st.washout*0.008);                // 適度な捻り下げで効率改善
  e-=Math.max(0,(st.washout-4)*0.01);                // 過大な捻り下げは損失
  e=Math.max(0.7,Math.min(0.97,e));
  // プロペラ効率: 配置 + ブレード枚数(2枚が最高効率、多翼は推力密度↑だが効率微減)
  let propEff=st.config==="pylon"?0.87:st.config==="tractor"?0.82:0.8;
  propEff-=(st.propBlades-2)*0.015;
  propEff=Math.max(0.7,propEff);
  // 最大揚力係数: 翼型固有 + 捻り下げで実効的に若干低下(翼端が早く頭打ち)
  const CLmaxWing=af.clmax-Math.min(0.12,st.washout*0.02);
  return {CD0,e,propEff,CLmaxWing,cl0:af.cl0,cm:af.cm,reSens:af.reSens,thick:af.thick};
}
function interpA(xs,ys,x){
  if(x<=xs[0])return ys[0];
  for(let i=1;i<xs.length;i++)if(x<=xs[i]){const u=(x-xs[i-1])/(xs[i]-xs[i-1]||1);return lerp(ys[i-1],ys[i],u);}
  return ys[ys.length-1];
}

// ---- 2Dチャート描画(Canvas) ----
function drawChart(cv,opt){
  if(!cv)return;
  const dpr=Math.min((window.devicePixelRatio||1),2);
  const w=cv.clientWidth||560,h=cv.clientHeight||210;
  cv.width=w*dpr;cv.height=h*dpr;
  const c=cv.getContext("2d");c.setTransform(dpr,0,0,dpr,0,0);
  c.clearRect(0,0,w,h);
  const P={l:50,r:14,t:18,b:28};
  let xs=[],ys=[];
  for(const s of opt.series)for(const p of s.pts){if(isFinite(p[0])&&isFinite(p[1])){xs.push(p[0]);ys.push(p[1]);}}
  if(!xs.length)return;
  let x0=Math.min(...xs),x1=Math.max(...xs),y0=Math.min(...ys),y1=Math.max(...ys);
  if(opt.yZero)y0=Math.min(0,y0);
  if(x1-x0<1e-9)x1=x0+1;if(y1-y0<1e-9)y1=y0+1;
  const py=(y1-y0)*0.08;y1+=py;if(!(opt.yZero&&y0>=0))y0-=py;
  const X=v=>P.l+(v-x0)/(x1-x0)*(w-P.l-P.r);
  const Y=v=>h-P.b-(v-y0)/(y1-y0)*(h-P.t-P.b);
  if(opt.redBelowY!=null&&opt.redBelowY>y0){
    c.fillStyle="rgba(192,57,43,.10)";
    c.fillRect(P.l,Y(Math.min(opt.redBelowY,y1)),w-P.l-P.r,h-P.b-Y(Math.min(opt.redBelowY,y1)));
  }
  const fmt=v=>{const a=Math.abs(v);return a>=10000?(v/1000).toFixed(0)+"k":a>=1000?(v/1000).toFixed(1)+"k":a>=100?v.toFixed(0):a>=10?v.toFixed(1):v.toFixed(2);};
  c.strokeStyle="#DCE4EC";c.fillStyle="#46587A";c.font="10px ui-monospace,monospace";c.lineWidth=1;
  for(let i=0;i<=5;i++){
    const xv=x0+(x1-x0)*i/5,yv=y0+(y1-y0)*i/5;
    c.beginPath();c.moveTo(X(xv),P.t);c.lineTo(X(xv),h-P.b);c.stroke();
    c.beginPath();c.moveTo(P.l,Y(yv));c.lineTo(w-P.r,Y(yv));c.stroke();
    c.textAlign="center";c.fillText(fmt(xv),X(xv),h-P.b+14);
    c.textAlign="right";c.fillText(fmt(yv),P.l-5,Y(yv)+3);
  }
  c.fillStyle="#1B2A4A";c.font="10.5px sans-serif";c.textAlign="left";
  if(opt.yLabel)c.fillText(opt.yLabel,4,11);
  if(opt.xLabel)c.fillText(opt.xLabel,w-P.r-c.measureText(opt.xLabel).width,h-7);
  for(const s of opt.series){
    c.strokeStyle=s.color;c.lineWidth=s.width||1.8;c.setLineDash(s.dash||[]);
    c.beginPath();
    s.pts.forEach((p,i)=>i?c.lineTo(X(p[0]),Y(p[1])):c.moveTo(X(p[0]),Y(p[1])));
    c.stroke();c.setLineDash([]);
  }
  for(const m of (opt.marks||[])){
    c.fillStyle=m.color||"#E8590C";
    c.beginPath();c.arc(X(m.x),Y(m.y),3.5,0,7);c.fill();
    c.font="10px sans-serif";c.textAlign="left";
    c.fillText(m.label,X(m.x)+6,Y(m.y)-5);
  }
  let lx=P.l+6;
  for(const s of opt.series){if(!s.label)continue;
    c.strokeStyle=s.color;c.lineWidth=2;c.setLineDash(s.dash||[]);
    c.beginPath();c.moveTo(lx,P.t-7);c.lineTo(lx+16,P.t-7);c.stroke();c.setLineDash([]);
    c.fillStyle="#1B2A4A";c.font="10px sans-serif";c.textAlign="left";
    c.fillText(s.label,lx+20,P.t-4);lx+=c.measureText(s.label).width+46;
  }
}

function effDih(){return (st.jig==="flat"?0:st.dihedral)*Math.PI/180;}

// 揚力(1G)と翼自重(1g)それぞれ単独のたわみ曲線(線形重ね合わせ用)
function computeFlexBasis(){
  const a=an||analyze(st),g=9.81,half=st.span/2,N=60;
  const W1=a.W*g,wWing=a.items[0].w;
  const ys=[],cA=[],cE=[];
  for(let i=0;i<=N;i++){const t=i/N;ys.push(t*half);cA.push(chordAt(st,t));
    cE.push((4*a.S/(Math.PI*st.span))*Math.sqrt(Math.max(0,1-t*t)));}
  const dy=half/N;
  const trap=f=>{let s=0;for(let i=0;i<N;i++)s+=(f[i]+f[i+1])/2*dy;return s;};
  const cS=ys.map((_,i)=>(cA[i]+cE[i])/2);
  const Lp=cS.map(v=>v*W1/(2*trap(cS)));          // 揚力1G分布
  const wp=cA.map(v=>v*wWing*g/(2*trap(cA)));     // 自重1g分布
  const E=110e9;
  const EI=ys.map(y=>{const d=lerp(st.rootDia,st.tipDia,y/half)/1000,t=d/80;return E*Math.PI*Math.pow(d/2,3)*t;});
  const beam=load=>{
    const Sh=new Array(N+1).fill(0),M=new Array(N+1).fill(0);
    for(let i=N-1;i>=0;i--){Sh[i]=Sh[i+1]+(load[i]+load[i+1])/2*dy;M[i]=M[i+1]+(Sh[i+1]+Sh[i])/2*dy;}
    const th=[0],de=[0];
    for(let i=1;i<=N;i++){th[i]=th[i-1]+(M[i-1]/EI[i-1]+M[i]/EI[i])/2*dy;de[i]=de[i-1]+(th[i-1]+th[i])/2*dy;}
    return de;
  };
  return {ys,dL:beam(Lp),dW:beam(wp)};
}

// ---- Schrenk近似: 揚力分布・せん断・曲げ・たわみ ----
function computeLoads(n){
  const a=an||analyze(st),g=9.81,half=st.span/2,N=60;
  const W=a.W*g*n,wWing=a.items[0].w;
  const ys=[],cA=[],cE=[];
  for(let i=0;i<=N;i++){const t=i/N;ys.push(t*half);cA.push(chordAt(st,t));
    cE.push((4*a.S/(Math.PI*st.span))*Math.sqrt(Math.max(0,1-t*t)));}
  const dy=half/N;
  const trap=f=>{let s=0;for(let i=0;i<N;i++)s+=(f[i]+f[i+1])/2*dy;return s;};
  const cS=ys.map((_,i)=>(cA[i]+cE[i])/2);
  const kL=W/(2*trap(cS)), Lp=cS.map(v=>v*kL);
  const kE=W/(2*trap(cE)), LpE=cE.map(v=>v*kE);
  const kw=n*wWing*g/(2*trap(cA));
  const net=ys.map((_,i)=>Lp[i]-cA[i]*kw);
  const Sh=new Array(N+1).fill(0),M=new Array(N+1).fill(0);
  for(let i=N-1;i>=0;i--){Sh[i]=Sh[i+1]+(net[i]+net[i+1])/2*dy;M[i]=M[i+1]+(Sh[i+1]+Sh[i])/2*dy;}
  const E=110e9;
  const EI=ys.map(y=>{const d=lerp(st.rootDia,st.tipDia,y/half)/1000,t=d/80;return E*Math.PI*Math.pow(d/2,3)*t;});
  const th=[0],de=[0];
  for(let i=1;i<=N;i++){th[i]=th[i-1]+(M[i-1]/EI[i-1]+M[i]/EI[i])/2*dy;de[i]=de[i-1]+(th[i-1]+th[i])/2*dy;}
  const Mallow=0.0033*Math.pow(st.rootDia,3);
  return {ys,Lp,LpE,M,defl:de,tip:de[N],Mroot:M[0],Mallow,SF:Mallow/M[0]};
}

// ---- 速度/ドラッグポーラー ----
function computePolar(){
  const a=an,rho=1.225,g=9.81,W=a.W*g,{CD0,e,propEff}=aeroConsts();
  const CLmax=Math.min(simPrm.CLmax, aeroConsts().CLmaxWing);
  const Vs=Math.sqrt(2*W/(rho*a.S*CLmax));
  const pP=[],pLD=[];let mp=null,bg=null;
  for(let V=Vs;V<=15;V+=0.1){
    const CL=2*W/(rho*V*V*a.S);
    const CD=CD0+CL*CL/(Math.PI*a.AR*e);
    const P=0.5*rho*V*V*V*a.S*CD/propEff,LD=CL/CD;
    pP.push([V,P]);pLD.push([V,LD]);
    if(!mp||P<mp.y)mp={x:V,y:P};
    if(!bg||LD>bg.y)bg={x:V,y:LD};
  }
  const Vc=a.V;
  const Dp=0.5*rho*Vc*Vc*a.S*CD0,Di=0.5*rho*Vc*Vc*a.S*(1/(Math.PI*a.AR*e));
  return {Vs,pP,pLD,mp,bg,Dp,Di};
}

// ---- 突風・追い風の静的解析 ----
function gustCalc(){
  const a=an,rho=1.225,g=9.81,W=a.W*g;
  const Vs=Math.sqrt(2*W/(rho*a.S*Math.min(simPrm.CLmax,aeroConsts().CLmaxWing)));
  const V=a.V;
  const slope=2*Math.PI*a.AR/(a.AR+2);
  const dA=Math.atan2(simPrm.gust,V);
  const n=1+0.5*rho*V*V*a.S*slope*dA/W;
  const launchVa=simPrm.V0-simPrm.wind;
  const r=computeLoads(1);
  return {Vs,V,margin:(V-Vs)/Vs*100,launchVa,launchOK:launchVa>=Vs*1.05,
    dA:dA*180/Math.PI,n,sfGust:r.Mallow/(r.Mroot*n)};
}

const simPrm={P:270,V0:7.0,wind:0,xwind:0,wdir:0,wspd:0,gust:1.0,CLmax:1.4,hTgt:2.0,speed:3,mode:"platform",auto:false,wcap:20,sens:1.0,hold:false,temp:20,turb:0.3,view:"chase",tod:7.0,summer:true,thermal:0.0,ghost:true,_t:0};
// 風向(吹いてくる方角: 0°=正面=向かい風, 90°=右から, 180°=追い風)+風速 → コース成分へ分解
function applyWindVec(){
  const th=simPrm.wdir*Math.PI/180;
  simPrm.wind=+( simPrm.wspd*-Math.cos(th)).toFixed(3)*1; // 追い風+
  simPrm.xwind=+(simPrm.wspd*-Math.sin(th)).toFixed(3)*1; // 右流され+(左から吹くと+)

// 夏の琵琶湖: 時刻で気温・浜風(湖陸風)・乱流・サーマルを自動設定
// 鳥人間は早朝〜午前が勝負。午後は浜風が強まり危険、という実条件を再現
// 夏の琵琶湖の「その日の天候」をランダムに引く(実際の気象パターンに基づく)
const BIWA_WEATHER=[
  {id:"calm",   n:"快晴・朝凪",   d:"絶好のコンディション。風弱く安定",   wind:0.6, gust:0.5, turb:0.6, therm:0.8, dirJit:15, prob:0.30},
  {id:"normal", n:"晴れ・通常",   d:"標準的な夏の日。午後から浜風",       wind:1.0, gust:0.9, turb:1.0, therm:1.0, dirJit:25, prob:0.32},
  {id:"breezy", n:"やや強風",     d:"南西の風が強め。午後は注意",         wind:1.5, gust:1.2, turb:1.3, therm:0.9, dirJit:30, prob:0.18},
  {id:"hira",   n:"比良おろし",   d:"比良山地からの吹き下ろし。突風に警戒", wind:1.7, gust:1.8, turb:1.6, therm:0.7, dirJit:45, prob:0.10},
  {id:"humid",  n:"高温多湿・不安定",d:"気温高く対流活発。サーマル強・乱流大",wind:1.1, gust:1.4, turb:1.5, therm:1.4, dirJit:35, prob:0.10},
];
function rollBiwaWeather(){
  const r=Math.random();let acc=0;
  for(const w of BIWA_WEATHER){acc+=w.prob;if(r<=acc)return w;}
  return BIWA_WEATHER[1];
}
function applySummer(){
  if(!simPrm.summer)return;
  const t=simPrm.tod; // 5〜18時
  // その日の天候(未設定なら引く)
  if(!simPrm.weather)simPrm.weather=rollBiwaWeather();
  const wx=simPrm.weather;
  // 気温: 早朝22℃→午後14時に34℃ピーク + 日替わりのゆらぎ(±2℃)
  const tempBase=22+12*Math.max(0,Math.sin((t-6)/12*Math.PI));
  simPrm.temp=Math.round(tempBase+(wx.id==="humid"?2:0)+(simPrm._tempJit||0));
  // 浜風: 朝凪→午前発達→午後最強。天候係数 + ランダムなゆらぎ
  const seaBreeze=Math.max(0,Math.min(1,(t-9)/4))*Math.max(0,1-(t-16)/3);
  const breezeNoise=1+(Math.random()-0.5)*0.25;       // 瞬間ごとの±12%変動
  simPrm.wspd=+Math.max(0,(0.5+3.8*seaBreeze)*wx.wind*breezeNoise).toFixed(1);
  // 風向: 基本は南西(湖→陸)、天候ごとのばらつき(比良おろしは振れ大)
  simPrm.wdir=Math.round(200+(simPrm._dirJit||0)*1);
  // 乱流・サーマル: 時刻 × 天候係数
  simPrm.turb=+Math.max(0,(0.2+0.7*Math.max(0,Math.sin((t-6)/12*Math.PI)))*wx.turb).toFixed(2);
  simPrm.thermal=+Math.max(0,(0.6*Math.max(0,Math.sin((t-7)/11*Math.PI)))*wx.therm).toFixed(2);
  // 突風強度(別途gustに反映)
  simPrm.gust=+(wx.gust*(0.5+seaBreeze)).toFixed(2);
  applyWindVec();
}

function groundEffect(h){const hw=Math.max(0.3,h+2.0);const r=16*hw/st.span;return Math.max(0.2,r*r/(1+r*r));}

function aeroPack(){
  const a=an,{CD0,e,propEff}=aeroConsts();
  // 大気密度: 海面標準を気温で補正(琵琶湖≒標高86m, ρ=P/(R·T))
  const T0=simPrm.temp+273.15, P0=101325*Math.pow(1-2.25577e-5*86,5.2559);
  const rho=P0/(287.05*T0);
  const g=9.81,W=a.W*g;
  const CLmax=simPrm.CLmax;
  const Vs=Math.sqrt(2*W/(rho*a.S*CLmax));
  const Vt=Math.max(a.V,1.15*Vs);
  const A=Math.PI*Math.pow(st.propDia/2,2);
  const Vdesign=a.V;                                    // プロペラ設計点(巡航速度)
  const chordRef=a.MAC;                                 // 代表コード長(レイノルズ数用)
  // 最小パワー速度(最も省エネに巡航できる速度)= オートの目標速度
  let Vmp=Vs*1.1, Pmin=1e9;
  for(let v=Vs*1.02;v<=14;v+=0.1){
    const CL=2*W/(rho*v*v*a.S);
    if(CL>CLmax)continue;
    const CD=CD0+CL*CL/(Math.PI*a.AR*e);
    const P=0.5*rho*v*v*v*a.S*CD/propEff;
    if(P<Pmin){Pmin=P;Vmp=v;}
  }
  const nFail=computeLoads(1).SF;                       // 桁折損する荷重倍数(Schrenk曲げ基準)
  const VNE=Math.max(16,1.9*a.V);                       // 超過禁止速度(フラッター/フィルム破壊)。発進ダイブ(〜13m/s)は許容
  const sg=simPrm.sens;                                  // 操舵感度(0.3〜1.5)
  const ailRate=(st.mode==="large"?7:st.mode==="small"?4:0)*Math.PI/180*sg; // ロール角速度/full
  const rudYaw=2.5*Math.PI/180*sg, rudRoll=1.2*Math.PI/180*sg; // ラダー直接ヨー+上反角効果ロール
  const elevAuth=0.65*sg;                                // エレベーター舵効き
  const hasGear=st.gear&&st.gear!=="none";
  const gearCD=hasGear?(st.gear==="tri"?0.0016:0.0009):0; // 着陸装置の形状抗力
  const CP=st.powerMax;                                 // パイロット持続出力(⑥の設定)
  return {a,CD0:CD0+gearCD,e,propEff,rho,g,W,m:a.W,S:a.S,CLmax,Vs,Vt,A,AR:a.AR,nFail,VNE,ailRate,rudYaw,rudRoll,elevAuth,hasGear,CP,Vdesign,chordRef,Vmp,Pmin};
}

// 1物理ステップ(dt秒)。操舵L.eと出力simPrm.Pをリアルタイム反映
function stepSim(L,dt){
  const c=L.c,q=0.5*c.rho*L.V*L.V;
  // 連続乱流(有色ノイズ): 地面付近で強く、上空で弱まる。縦(迎角)と横に作用
  const turbScale=simPrm.turb*Math.max(0.25,Math.min(1,3.5/Math.max(L.h,0.5)));
  L.tz=(L.tz||0)*0.94+(Math.random()-0.5)*turbScale*0.9;   // 上下動(沈下/吹き上げ)
  L.ty=(L.ty||0)*0.94+(Math.random()-0.5)*turbScale*0.7;   // 横揺れ
  // サーマル(熱上昇気流): 数百m間隔の上昇帯。乱流tzには入れず、別枠で緩やかな上昇流として扱う
  L.thrmVz=0;
  if(simPrm.thermal>0){
    const cell=Math.sin(L.x*0.0045+1.3)*Math.cos(L.x*0.0021+L.yl*0.008);
    const core=Math.max(0,cell-0.45)/0.55;
    const target=simPrm.thermal*(core>0?0.5*core:-0.02);    // 上昇流速度 m/s 相当
    L.thrm=(L.thrm||0)*0.985+target*0.015;                  // 強い平滑化(空間的に緩やか)
    L.inThermal=core>0.3;
    L.thrmVz=L.thrm;
  }
  // 操舵なまし。入力時は約0.25秒、中立へ戻すときは更に速く(離したらすぐ戻る自然な操作感)
  for(const ax of ["e","ail","rud"]){
    const tg=L.auto?0:L[ax+"Tgt"];
    const d=tg-L[ax];
    // 目標が中立(0)に近い=キーを離した→速く戻す。入力中はやや穏やか
    const returning=Math.abs(tg)<0.05;
    const rate=(returning?8.0:4.5)*(0.6+0.4*simPrm.sens);
    L[ax]+=Math.max(-rate*dt,Math.min(rate*dt,d));
    if(Math.abs(L[ax])<0.02&&Math.abs(tg)<0.05)L[ax]=0; // 微小値はゼロに吸着
  }
  // ---- 出力決定: 手動=スライダー / オート=体力モデル(CP+W'bal)で高度維持 ----
  let P;
  if(L.auto){
    const CPe=c.CP*(1-0.08*L.t/3600);                 // 長時間疲労: -8%/h
    const Pinst=L.wbal>0?CPe+Math.min(300,L.wbal/6):CPe; // 無酸素バーストの上限
    const Vtgt=c.Vmp;
    // ソフト目標高度: 発進高度から目標へゆっくり移行(急降下/急上昇を防ぐ)
    if(L.softHTgt==null)L.softHTgt=L.h;               // 初回は現在高度から開始
    const rate=0.5*dt;                                // 移行速度 0.5m/s
    L.softHTgt+=Math.max(-rate,Math.min(rate,simPrm.hTgt-L.softHTgt));
    const hErr=L.softHTgt-L.h;
    const Vz0=L.V*Math.sin(L.gam);
    const climbP=c.W*Math.max(0,hErr*0.4-Vz0)*0.9;    // 上昇に要する追加パワー
    let Ptarget=c.Pmin*1.04 + climbP;
    Ptarget+=(Vtgt-L.V)*22*c.m/10;
    P=Math.max(30,Math.min(Pinst, Ptarget));
    if(L.ground)P=Pinst;                              // 滑走中は全力
    if(P>CPe)L.wbal=Math.max(0,L.wbal-(P-CPe)*dt);    // W'消費
    else L.wbal=Math.min(simPrm.wcap*1000,L.wbal+(CPe-P)*0.35*dt); // 回復
    L.Pnow=P;
    L.autoVtgt=Vtgt;
  } else { P=simPrm.P; L.Pnow=P; }
  // プロペラ効率は設計点(巡航)で最大、低速・高速で低下(釣鐘特性)
  const jr=L.V/Math.max(c.Vdesign,3);
  const etaP=c.propEff*Math.max(0.45,1-0.55*Math.pow(jr-1,2));
  const Tmax=0.8*Math.cbrt(2*c.rho*c.A*Math.pow(P*etaP,2));
  const T=Math.min(P*etaP/Math.max(L.V,1.5),Tmax);
  L.etaP=etaP;
  if(L.ground){
    const CLg=0.8+0.3*Math.max(0,L.e);            // 引き起こしで迎角増
    const lift=q*c.S*CLg;
    const CDg=c.CD0+CLg*CLg/(Math.PI*c.AR*c.e)*groundEffect(0);
    const dV=(T-q*c.S*CDg-0.02*Math.max(0,c.W-lift))/c.m;
    L.V=Math.max(0,L.V+dV*dt);
    L.x+=Math.max(0,L.V+simPrm.wind)*dt; L.t+=dt;
    L.n=lift/c.W;
    if(L.V>=1.02*c.Vt||(L.e>0.25&&L.V>=1.04*c.Vs)){L.ground=false;if(L.groundRoll==null)L.groundRoll=L.x;}
    else if((simPlay?(simPlay.z0-L.x):480-L.x)<10){L.overrun=true;L.done=true;}
    else if(dV<=0.005&&L.t>20){L.overrun=true;L.done=true;}
    return;
  }
  // ---- 破壊後: 揚力を失って落下 ----
  if(L.broken){
    L.phi+=0.7*dt;                                  // 錐もみ
    L.gam=Math.max(-1.2,L.gam-0.5*dt);
    const CDw=0.08;
    const dVw=(-q*c.S*CDw)/c.m-c.g*Math.sin(L.gam);
    L.V=Math.max(2,L.V+dVw*dt);
    L.h=Math.max(0,L.h+L.V*Math.sin(L.gam)*dt);
    L.x+=Math.max(0,L.V*Math.cos(L.gam)*Math.cos(L.psi)+simPrm.wind)*dt;
    L.yl+=(L.V*Math.cos(L.gam)*Math.sin(L.psi)+simPrm.xwind)*dt;
    L.t+=dt; L.n=0.2;
    if(L.h<=0){L.splash=true;L.done=true;L.impact="crash";}
    return;
  }
  // ---- 横の運動: エルロン/ラダー → バンク・方位 ----
  const phiMax=0.55+0.25*simPrm.sens;
  const dphi=c.ailRate*L.ail + c.rudRoll*L.rud - 0.12*L.phi;
  L.phi=Math.max(-phiMax,Math.min(phiMax,L.phi+dphi*dt));
  // ---- 縦+揚力 ----
  const CLl=Math.min(c.CLmax,c.W*Math.cos(L.gam)/Math.max(q*c.S*Math.max(0.3,Math.cos(L.phi)),1));
  const Vz=L.V*Math.sin(L.gam);
  // 高度ホールド: オート時は常時ON(ソフト目標へ緩やかに)。手動時はトグルON+操舵入力無しのみ
  const holdOn=L.auto||simPrm.hold;
  const holdTgt=L.auto?(L.softHTgt!=null?L.softHTgt:simPrm.hTgt):simPrm.hTgt;
  const holdGain=holdOn?(L.auto?1:Math.max(0,1-Math.abs(L.e)*5)):0;
  const hold=Math.max(-0.10,Math.min(0.10,0.03*(holdTgt-L.h)))*holdGain;
  let CL=CLl*Math.min(1,(L.V/c.Vt)*(L.V/c.Vt))+hold-0.10*Vz+c.elevAuth*L.e;
  CL=Math.max(0.05,Math.min(c.CLmax,CL));
  const lift=q*c.S*CL;
  L.n=lift/c.W;                                     // 翼が受ける荷重倍数
  // レイノルズ数効果: Re=ρVc/μ。設計Re(巡航)を基準に形状抗力が変動(低Reで層流分離→増)
  const Re=c.rho*L.V*c.chordRef/1.81e-5;
  const ReD=c.rho*c.Vdesign*c.chordRef/1.81e-5;
  const reFac=Math.max(0.85,Math.min(1.5,Math.pow(ReD/Math.max(Re,1e4),0.18)));
  let CD=c.CD0*reFac+CL*CL/(Math.PI*c.AR*c.e)*groundEffect(L.h);
  if(L.V<c.Vs)CD+=0.12*(c.Vs/L.V-1);
  CD+=0.010*L.rud*L.rud+0.004*L.ail*L.ail;          // 横滑り・舵抗力
  L.Re=Re;
  // ---- 剛性モデル: 限界超過で破壊 ----
  if(L.n>c.nFail){L.broken=`主桁折損(n=${L.n.toFixed(2)} > 限界${c.nFail.toFixed(2)})`;return;}
  if(L.n<-0.5){L.broken="負荷重で主桁折損(押さえすぎ)";return;}
  if(L.V>c.VNE){L.broken=`超過速度でフラッター破壊(V=${L.V.toFixed(1)} > VNE ${c.VNE.toFixed(1)} m/s)`;return;}
  // ---- 運動方程式(3自由度) ----
  const dV=(T-q*c.S*CD)/c.m-c.g*Math.sin(L.gam);
  let dg=(lift*Math.cos(L.phi)/c.m-c.g*Math.cos(L.gam))/Math.max(L.V,1);
  dg=Math.max(-0.6,Math.min(0.25,dg));
  const dpsi=lift*Math.sin(L.phi)/(c.m*Math.max(L.V,1)*Math.max(0.3,Math.cos(L.gam)))+c.rudYaw*L.rud;
  L.V=Math.max(0.5,L.V+dV*dt);
  L.gam=Math.max(-1.2,Math.min(0.35,L.gam+dg*dt));
  L.psi+=dpsi*dt;
  L.maxBank=Math.max(L.maxBank||0,Math.abs(L.phi));
  if(L.inThermal)L.inThermalUsed=true;
  // 乱流による外乱(機体に直接働く上下/横の風)
  const turbVz=(L.tz||0), turbVy=(L.ty||0);
  L.h=Math.max(0,L.h+(L.V*Math.sin(L.gam)+turbVz+(L.thrmVz||0))*dt);
  // ---- 接地判定: 脚があり緩降下なら再着陸して滑走に戻る ----
  if(L.h<=0&&L.V*Math.sin(L.gam)<0){
    const sink=-L.V*Math.sin(L.gam);                       // 沈下率 m/s
    const onLand=(simPlay&&(simPlay.z0-L.x)>14);           // 滑走路(陸)上か
    if(c.hasGear&&onLand&&sink<1.5&&Math.abs(L.phi)<0.25){ // ソフトに接地
      L.ground=true;L.h=0;L.gam=0;L.touchdowns=(L.touchdowns||0)+1;
    } else {
      L.splash=true;L.h=0;L.done=true;L.impact=(L.broken||!onLand&&sink>1.5)?"crash":(onLand?"crash":"splash");
    }
  }
  // 方位を ±π に正規化(累積発散を防ぐ)
  if(L.psi>Math.PI)L.psi-=2*Math.PI; else if(L.psi<-Math.PI)L.psi+=2*Math.PI;
  const vh=L.V*Math.cos(L.gam);                            // 水平対気速度
  // 地上位置(3D描画/コース判定用): 機首方位+風で平面移動
  L.x+=(vh*Math.cos(L.psi)+simPrm.wind)*dt;                // コース軸(前+)
  L.yl+=(vh*Math.sin(L.psi)+simPrm.xwind+turbVy)*dt;       // 横(右+)+乱流
  // 飛行距離(計測用): 実際に空中を進んだ経路長。旋回しても単調増加
  L.path+=Math.max(0,L.V)*Math.cos(L.gam)*dt;
  L.t+=dt;
  if(Math.abs(L.yl)>2500){L.offcourse=true;L.done=true;} // 横に極端に外れた時のみ(前後の移動・旋回・後退は自由)
  if(L.t>=3600||L.path>=30000)L.done=true;
}
function simSample(L){return {t:+L.t.toFixed(2),x:L.x,h:L.h,V:L.V,gam:L.gam,n:L.n,yl:L.yl,phi:L.phi,path:L.path,psi:L.psi};}

function startSim(){
  stopSim();
  // 夏の琵琶湖モード: 毎フライト天候を引き直す(ランダム要素)
  if(simPrm.summer){simPrm.weather=rollBiwaWeather();simPrm._dirJit=0;simPrm._tempJit=0;applySummer();}
  const c=aeroPack();
  const runway=simPrm.mode==="runway";
  const noGearRunway=runway&&!c.hasGear;
  const L={c,ground:runway&&c.hasGear,
    V:runway?Math.max(0.2,0.5-simPrm.wind):Math.max(0.5,simPrm.V0-simPrm.wind),
    gam:0,h:runway?0:10,x:0,t:0,acc:0,e:0,eTgt:0,n:runway?0:1,
    phi:0,psi:0,yl:0,path:0,ail:0,ailTgt:0,rud:0,rudTgt:0,broken:null,
    auto:simPrm.auto,wbal:simPrm.wcap*1000,Pnow:simPrm.auto?st.powerMax:simPrm.P,
    groundRoll:null,overrun:false,splash:false,done:false,lastSample:0,frame:0};
  if(noGearRunway){L.done=true;L.overrun=true;L.nogear=true;}
  simRes={out:[simSample(L)],Vs:c.Vs,runway,dist:0,time:0,splash:false,overrun:false,groundRoll:null};
  const z0=runway?490:0, h0=runway?0:10.2;
  platform=new THREE.Group();
  // プラットフォーム発進では常設dock(z=2付近・天面y=10.2)をそのまま発進台に使う。
  // ここでは追加の台は作らず、コースブイのみ配置する。
  // コースブイ: 100m刻み(〜2km)+500m刻み(〜10km)、1kmごとに赤 ※湖上のみ
  for(let d=100;d<=10000;d+=100){
    if(d%500!==0&&d>2000)continue;
    const zb=z0-d;
    if(zb>-15)continue;
    const big=d%500===0, km=d%1000===0;
    const r=km?1.6:big?1.1:0.5;
    const mat=new THREE.MeshPhongMaterial({color:km?0xd9342b:0xe8590c});
    for(const sx of [12,-12]){
      const bu=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),mat);
      bu.position.set(sx,r*0.55,zb);platform.add(bu);
    }
  }
  scene.add(platform);
  // ゴースト機(自己ベストの軌跡を半透明で再生)
  if(ghostMesh){scene.remove(ghostMesh);ghostMesh=null;}
  ghostPath=null;
  if(simPrm.ghost){
    const best=loadBest();
    if(best&&best.path&&best.path.length>5){
      ghostPath=best.path; ghostMesh=new THREE.Group();
      const body=new THREE.Mesh(new THREE.BoxGeometry(st.span*0.9,0.12,0.5),
        new THREE.MeshBasicMaterial({color:0x44aaff,transparent:true,opacity:0.35}));
      ghostMesh.add(body);
      const tail=new THREE.Mesh(new THREE.BoxGeometry(2,0.1,0.4),
        new THREE.MeshBasicMaterial({color:0x44aaff,transparent:true,opacity:0.35}));
      tail.position.z=3; ghostMesh.add(tail);
      scene.add(ghostMesh);
    }
  }
  simPlay={wait:2,live:L,trailPts:[],lastX:-99,z0,ghostIdx:0}; // 2秒待機後に発進
  if(aircraft)aircraft.position.set(0,h0,z0);
}
// ---- 衝突エフェクト(着水スプラッシュ / 地面の砂煙) ----
let fxParts=null;
function spawnCrashFx(pos,kind){
  clearFx();
  const g=new THREE.Group();
  const water=kind==="water";
  const n=water?90:60;
  const parts=[];
  for(let i=0;i<n;i++){
    // 水: 丸い水滴(白〜水色)/地面: 細長い破片(機体色)+砂煙
    const r=water?(0.05+Math.random()*0.11):(0.05+Math.random()*0.13);
    const debris=!water&&Math.random()<0.5;
    const geo=debris?new THREE.BoxGeometry(r*1.8,r*0.3,r*0.6):new THREE.SphereGeometry(r,5,4);
    const col=water?(Math.random()<0.45?0xffffff:0xbfe3f5)
                   :(debris?(Math.random()<0.5?0xe7d9b8:0x23282e):0xcdbd97);
    const m=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({color:col,transparent:true,opacity:0.95}));
    m.position.copy(pos);
    const ang=Math.random()*Math.PI*2;
    const sp=water?(2.5+Math.random()*6.5):(1.8+Math.random()*5);
    const up=water?(5+Math.random()*8):(2+Math.random()*5);
    parts.push({m,v:new THREE.Vector3(Math.cos(ang)*sp,up,Math.sin(ang)*sp),
      life:1, w:water, spin:debris?(Math.random()-0.5)*12:0,
      sax:new THREE.Vector3(Math.random(),Math.random(),Math.random()).normalize()});
    g.add(m);
  }
  // 波紋(水=白い同心円を複数 / 地面=砂煙リング1枚)
  const rings=[];
  const rn=water?3:1;
  for(let k=0;k<rn;k++){
    const ring=new THREE.Mesh(new THREE.RingGeometry(0.3,0.55,32),
      new THREE.MeshBasicMaterial({color:water?0xffffff:0xc9b78f,transparent:true,opacity:0.7,side:THREE.DoubleSide,depthWrite:false}));
    ring.rotation.x=-Math.PI/2; ring.position.set(pos.x,0.05,pos.z);
    rings.push({mesh:ring,delay:k*0.18,max:water?(9+k*3):5}); g.add(ring);
  }
  // 水柱(着水の中心に立ち上がる飛沫の柱)
  let column=null;
  if(water){
    column=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.5,2.4,10),
      new THREE.MeshPhongMaterial({color:0xeaf6ff,transparent:true,opacity:0.85}));
    column.position.set(pos.x,1.2,pos.z); g.add(column);
  }
  scene.add(g);
  fxParts={g,parts,rings,column,t:0,kind,pos:pos.clone()};
}
function clearFx(){ if(fxParts){scene.remove(fxParts.g);fxParts=null;} }
function tickFx(){
  if(!fxParts)return;
  const dt=1/60; fxParts.t+=dt;
  for(const p of fxParts.parts){
    if(p.life<=0)continue;
    p.v.y-=14*dt;
    p.m.position.addScaledVector(p.v,dt);
    const floor=p.w?0.02:0.0;
    if(p.m.position.y<floor){p.m.position.y=floor;p.v.y*=-0.35;p.v.x*=0.6;p.v.z*=0.6;}
    if(p.spin)p.m.rotateOnAxis(p.sax,p.spin*dt);
    p.life-=dt*0.5;
    p.m.material.opacity=Math.max(0,p.life*0.92);
    if(!p.spin)p.m.scale.setScalar(Math.max(0.1,p.life));
  }
  for(const r of (fxParts.rings||[])){
    const tt=fxParts.t-r.delay;
    if(tt<0)continue;
    const s=1+tt*r.max; r.mesh.scale.set(s,s,s);
    r.mesh.material.opacity=Math.max(0,0.7*(1-tt/1.5));
  }
  if(fxParts.column){
    const t=fxParts.t;
    fxParts.column.scale.set(1+t*0.5,Math.max(0.05,1-t*1.1),1+t*0.5);
    fxParts.column.position.y=Math.max(0,1.2-t*1.0);
    fxParts.column.material.opacity=Math.max(0,0.85*(1-t/1.2));
  }
  if(fxParts.t>2.6)clearFx();
}

function stopSim(){
  clearFx();
  simPlay=null;

function simTick(){
  if(!simPlay)return;
  const L=simPlay.live;
  if(simPlay.wait>0){
    simPlay.wait-=1/60;
    applyFlex(0,1); // 発進前: 自重で翼端が垂れた状態
    const zw=simPlay.z0;
    orbit.target.set(0,L.h+1.5,zw);applyCam();
    updateSimReadout(L);
    return;
  }
  if(!L.done){
    L.acc+=simPrm.speed/60;
    let guard=0;
    while(L.acc>=0.02&&guard++<240&&!L.done){
      L.acc-=0.02;stepSim(L,0.02);
      // サンプリングはステップ毎に判定(高速再生でも0.2s間隔を保ち、データが間引かれない)
      if(L.t-L.lastSample>=0.2){simRes.out.push(simSample(L));L.lastSample=L.t;}
    }
    if(L.done){simRes.out.push(simSample(L));L.lastSample=L.t;}
  }
  L.frame++;
  const zw=simPlay.z0-L.x;
  if(aircraft){
    aircraft.position.set(L.yl,L.h,zw);
    aircraft.rotation.set(L.gam,-L.psi,L.phi);
    if(L.done&&L.splash&&!L.broken)aircraft.visible=(L.frame%6<4);
    aircraft.visible=aircraft.visible&&!fpvMode; // FPVでは自機を隠す
  }
  fpvState={x:L.yl,y:L.h,z:zw,gam:L.gam,psi:L.psi,phi:L.phi};
  // ゴースト機: 自機と同じ進行距離の地点を表示(競走風)
  if(ghostMesh&&ghostPath){
    let gi=simPlay.ghostIdx;
    while(gi<ghostPath.length-1&&ghostPath[gi].x<L.x)gi++;
    simPlay.ghostIdx=gi;
    const gp=ghostPath[gi];
    ghostMesh.position.set(gp.yl, gp.h, simPlay.z0-gp.x);
    ghostMesh.visible=gi<ghostPath.length-1;
  }
  applyFlex(L.broken?3.0:(L.n!=null?L.n:1), L.ground?1:(L.n!=null?L.n:1));
  if(L.x-simPlay.lastX>2){
    simPlay.lastX=L.x;
    simPlay.trailPts.push(new THREE.Vector3(L.yl,L.h+1.6,zw));
    if(trail)scene.remove(trail);
    trail=new THREE.Line(new THREE.BufferGeometry().setFromPoints(simPlay.trailPts),
      new THREE.LineBasicMaterial({color:0xe8590c}));
    scene.add(trail);
  }
  orbit.target.set(L.yl,L.h+1.5,zw);applyCam();
  updateSimReadout(L);
  if(L.frame%45===0&&TOOLS.sim)TOOLS.sim.refresh();
  if(L.done){
    simRes.dist=L.path;simRes.time=L.t;simRes.splash=L.splash;
    simRes.overrun=L.overrun;simRes.groundRoll=L.groundRoll;simRes.brkMsg=L.broken;simRes.auto=L.auto;simRes.offcourse=L.offcourse;simRes.nogear=L.nogear;
    simRes.summer=simPrm.summer;simRes.tod=simPrm.tod;simRes.maxBank=L.maxBank||0;simRes.inThermalUsed=L.inThermalUsed||false;
    // 記録更新 & ゴースト保存(軌跡を間引いて保存)
    if(!simRes.runway&&simRes.dist>50){
      const recPath=simRes.out.filter((s,i)=>i%3===0).map(s=>({x:s.x,h:s.h,yl:s.yl}));
      const best=loadBest();
      if(!best||simRes.dist>best.dist){saveBest({dist:simRes.dist,path:recPath,name:tplSel.wing+"/"+st.span+"m"});simRes.newBest=true;}
      lastRecording=recPath;
    }
    simRes.badges=checkMissions(simRes);
    if(L.splash||(L.broken&&L.h<=0.5)){
      const cz=simPlay.z0-L.x;
      const onLand=cz>10; // 岸・滑走路側(z>10)は地面、それ以外は水面
      spawnCrashFx(new THREE.Vector3(L.yl,0.1,cz), onLand?"ground":"water");
    }
    simPlay=null;
    if(TOOLS.sim)TOOLS.sim.refresh();
    updateSimReadout(L);
  }
}
function updateSimReadout(L){
  drawHUD(L);
  const d=document.getElementById("simout");if(!d||!simRes)return;
  const cur=L||simRes.out[simRes.out.length-1]||{t:0,x:0,h:0,V:0};
  const flying=!!simPlay;
  const waiting=flying&&simPlay.wait>0;
  const stall=!waiting&&cur.V<simRes.Vs&&!(simPlay&&simPlay.live.ground);
  const ev=L?L.e:0;
  const lv=flying?simPlay.live:null;
  const nF=lv?lv.c.nFail:null;
  const nv=L&&L.n!=null?L.n:null;
  const nCol=nv!=null&&nF?(nv>0.85*nF?"var(--bad)":nv>0.6*nF?"var(--warn)":"inherit"):"inherit";
  const pTxt=lv?(lv.auto?`P ${lv.Pnow.toFixed(0)}W <span style="color:${lv.wbal<3000?"var(--bad)":"inherit"}">W' ${(lv.wbal/1000).toFixed(1)}kJ</span>`:`P ${simPrm.P}W`):"";
  const elev=flying?`<span>舵 ${ev>0.05?"▲":ev<-0.05?"▼":"—"}${Math.abs(ev*100).toFixed(0)}%</span><span>${pTxt}</span>`+
    (nv!=null?`<span style="color:${nCol}">n ${nv.toFixed(2)}${nF?"/"+nF.toFixed(2):""}</span>`:"")+
    (lv?`<span>バンク ${(lv.phi*180/Math.PI).toFixed(0)}°</span><span>横 ${lv.yl>=0?"+":""}${lv.yl.toFixed(0)}m</span>`:""):"";
  const roll=simRes.runway&&(simRes.groundRoll!=null||(L&&L.groundRoll!=null))
    ?` <span>滑走 <b>${((L&&L.groundRoll!=null?L.groundRoll:simRes.groundRoll)).toFixed(0)} m</b></span>`:"";
  const td=L&&L.touchdowns?` <span>接地 ${L.touchdowns}回</span>`:"";
  const brk=(L&&L.broken)||simRes.brkMsg;
  let fin=brk?`<b style="color:var(--bad)">⚠ ${brk}</b> `:"";
  if(!flying){
    fin+=simRes.offcourse
      ?`<b style="color:var(--warn)">コース逸脱で計測終了(直線距離 ${simRes.dist.toFixed(0)} m)</b>`
      :simRes.nogear
      ?`<b style="color:var(--bad)">着陸装置がないため滑走できません(⑥で単輪/三輪式を選択)</b>`
      :simRes.overrun
      ?`<b style="color:var(--bad)">滑走480m以内に離陸速度へ届きません(到達 ${simRes.dist.toFixed(0)} m)</b>`
      :simRes.splash
      ?`<b style="color:var(--bad)">着水! 飛距離 ${simRes.dist.toFixed(0)} m</b>`
      :simRes.dist>0
      ?`<b style="color:var(--ok)">${simRes.auto?"性能計測: ":""}${simRes.dist>=29999?"30km到達で打切り — 巡航成立!":(simRes.auto?"飛距離 "+simRes.dist.toFixed(0)+" m(体力切れ)":"時間切れ("+simRes.dist.toFixed(0)+" m)")}</b>`:"";
    if(simRes.newBest)fin+=` <b style="color:var(--accent)">🎉 自己ベスト更新!</b>`;
    else{const bst=loadBest();if(bst)fin+=` <span style="opacity:.7">(自己ベスト ${bst.dist.toFixed(0)}m)</span>`;}
    if(simRes.badges&&simRes.badges.length)fin+=`<br><span style="color:var(--accent)">${simRes.badges.join(" ")}</span>`;
  }
  d.innerHTML=(waiting?`<span><b>発進待機…</b></span>`:"")+
    (flying?`<span>t ${cur.t.toFixed(1)}s</span>`:`<span>距離 <b>${(cur.path!=null?cur.path:cur.x).toFixed(0)} m</b></span><span>最高 ${cur.h.toFixed(1)}m</span>`)+
    roll+td+" "+fin;
  // 飛行データオーバーレイ(画面下部・薄い灰色背景)
  updateFlightData(L,cur,flying,waiting,stall,fin);
}
function updateFlightData(L,cur,flying,waiting,stall,fin){
  const fd=document.getElementById("flightData");if(!fd)return;
  const sp=document.getElementById("sidePanel");
  if(appMode!=="flight"){fd.classList.remove("on");if(sp)sp.classList.remove("on");return;}
  fd.classList.add("on");
  const lv=flying?simPlay.live:null;
  const dist=(cur.path!=null?cur.path:cur.x)||0;
  if(flying&&!waiting&&lv){
    if(sp)sp.classList.toggle("on",!fpvMode);
    const nF=lv.c.nFail, nv=cur.n!=null?cur.n:1;
    const vCls=stall?"bad":"";
    const P=lv.auto?lv.Pnow:simPrm.P;
    // 対地速度 = 対気速度の水平成分 + 追い風成分
    const vAir=cur.V, vGround=vAir*Math.cos(cur.gam||0)+simPrm.wind;
    // 風向(吹いてくる方向)を矢印で
    const wd=((simPrm.wdir%360)+360)%360;
    const arrows=["↓","↙","←","↖","↑","↗","→","↘"];
    const wArrow=simPrm.wspd>0.1?arrows[Math.round(wd/45)%8]:"·";
    fd.innerHTML=`<div class="fd-row">
      <span class="fd-item">距離<b>${dist.toFixed(0)} m</b></span>
      <span class="fd-item ${vCls}">対気速度<b>${vAir.toFixed(1)} m/s</b></span>
      <span class="fd-item">対地速度<b>${vGround.toFixed(1)} m/s</b></span>
      <span class="fd-item">出力<b>${P.toFixed(0)} W</b></span>
      <span class="fd-item">高度<b>${cur.h.toFixed(1)} m</b></span>
      <span class="fd-item">荷重<b class="${nv>0.85*nF?'':''}">${nv.toFixed(2)}</b></span>
      <span class="fd-item fd-wind"><span class="fd-windarrow">${wArrow}</span><span>wind ${simPrm.wspd.toFixed(1)}</span></span>
    </div>`;
    // 右側の高度・速度グラフを更新
    drawSidePanels();
  } else if(waiting){
    if(sp)sp.classList.add("on");
    fd.innerHTML=`<div class="fd-msg"><b>発進待機中…</b></div>`;
  } else {
    if(sp)sp.classList.remove("on");
    fd.innerHTML=`<div class="fd-row"><span class="fd-item">飛行距離<b>${dist.toFixed(0)} m</b></span></div>`+
      (fin?`<div class="fd-msg">${fin}</div>`:"");
  }
}

function drawSidePanels(){

  const data=out.slice(-120);

  drawMiniGraph("spSpd",data.map(s=>s.V),"#FFD23F",0,simRes.Vs);
  const av=document.getElementById("spAltVal"), sv=document.getElementById("spSpdVal");

function drawMiniGraph(id,vals,color,yMin,refLine){
  const cv=document.getElementById(id);if(!cv||!vals.length)return;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const w=cv.clientWidth||200,h=cv.clientHeight||90;
  cv.width=w*dpr;cv.height=h*dpr;
  const c=cv.getContext("2d");c.setTransform(dpr,0,0,dpr,0,0);
  c.clearRect(0,0,w,h);
  let lo=Math.min(...vals,yMin!=null?yMin:Infinity), hi=Math.max(...vals);
  if(refLine!=null){lo=Math.min(lo,refLine);hi=Math.max(hi,refLine);}
  if(hi-lo<0.5)hi=lo+1;
  const pad=(hi-lo)*0.12;hi+=pad;lo-=pad;if(yMin!=null&&lo<yMin)lo=yMin;
  const X=i=>4+i/(vals.length-1||1)*(w-8);
  const Y=v=>h-6-(v-lo)/(hi-lo)*(h-12);
  // 軸
  c.strokeStyle="rgba(255,255,255,0.25)";c.lineWidth=1;
  c.beginPath();c.moveTo(4,h-6);c.lineTo(w-4,h-6);c.moveTo(4,6);c.lineTo(4,h-6);c.stroke();
  // 基準線(失速速度など)
  if(refLine!=null){
    c.strokeStyle="rgba(255,90,90,0.55)";c.setLineDash([4,3]);
    c.beginPath();c.moveTo(4,Y(refLine));c.lineTo(w-4,Y(refLine));c.stroke();c.setLineDash([]);
  }
  // 折れ線
  c.strokeStyle=color;c.lineWidth=2;c.beginPath();
  vals.forEach((v,i)=>{const x=X(i),y=Y(v);i?c.lineTo(x,y):c.moveTo(x,y);});
  c.stroke();
  // 末端の点
  c.fillStyle=color;c.beginPath();c.arc(X(vals.length-1),Y(vals[vals.length-1]),3,0,7);c.fill();
}
